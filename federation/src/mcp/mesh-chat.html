<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifold Mesh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
  #header h1 { font-size: 16px; font-weight: 600; }
  #header .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
  #status { font-size: 11px; color: #888; margin-left: auto; }
  #settings { padding: 10px 16px; border-bottom: 1px solid #222; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 12px; }
  #settings label { color: #888; display: flex; align-items: center; gap: 4px; }
  #settings input, #settings select { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; color: #e0e0e0; font-size: 12px; }
  #settings button { background: #333; color: #ccc; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  #cmd-bar { padding: 8px 16px; border-bottom: 1px solid #222; display: none; flex-wrap: wrap; gap: 6px; align-items: center; }
  #cmd-bar .cmd-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  #cmd-bar button { background: #1a2a1a; color: #4ade80; border: 1px solid #2a4a2a; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; font-family: monospace; }
  #cmd-bar button:hover { background: #2a3a2a; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; }
  .msg { margin-bottom: 12px; max-width: 700px; }
  .msg.user { margin-left: auto; text-align: right; }
  .msg .role { font-size: 10px; color: #666; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .msg .bubble { padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user .bubble { background: #1e40af; color: #fff; }
  .msg.system .bubble { background: #1a1a2e; border: 1px solid #2a2a4a; }
  .msg.error .bubble { background: #2a1a1a; border: 1px solid #4a2a2a; color: #f87171; }
  .msg pre { background: #111; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 12px; margin-top: 6px; }
  #input-bar { padding: 12px 16px; border-top: 1px solid #222; display: flex; gap: 8px; }
  #input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; font-size: 14px; outline: none; }
  #input:focus { border-color: #4ade80; }
  #send { background: #4ade80; color: #000; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; cursor: pointer; font-size: 14px; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="header">
  <div class="dot"></div>
  <h1>Manifold Mesh</h1>
  <span id="status">connecting...</span>
</div>

<div id="settings">
  <label>Relay <input id="relayUrl" value="http://157.230.13.79:8080/api" size="26"></label>
  <label>API Key <input id="apiKey" type="password" size="36" placeholder="Enter API key"></label>
  <label>Agent <select id="targetAgent"><option value="">loading...</option></select></label>
  <button id="refreshBtn">↻ Refresh</button>
</div>

<div id="cmd-bar">
  <span class="cmd-label">Commands:</span>
  <span id="cmd-buttons"></span>
</div>

<div id="chat"></div>

<div id="input-bar">
  <input id="input" placeholder="Type a command or message..." autocomplete="off">
  <button id="send">Send</button>
</div>

<script>
// ── Agent command registry ──────────────────────────────────────────────
const AGENT_COMMANDS = {
  'cron-monitor': ['check', 'audit', 'watch', 'errors', 'silence'],
  'data-detect': ['scan', 'check', 'baseline', 'anomaly', 'status'],
  'solar-detect': ['flare', 'cme', 'geo', 'status', 'forecast'],
  'dev-tooling': ['build', 'test', 'lint', 'debug'],
  'hog-deploy': ['plan', 'validate', 'deploy', 'rollback', 'status', 'manifest', 'surge'],
  'void-watcher': ['scan', '--once', 'watch', 'gaps', 'tension'],
  'fog-reader': ['read', 'pressure', 'seams', 'core'],
  'stella': ['status', 'analyze', 'advise', 'coordinate'],
  'eddie': ['status', 'execute', 'research', 'compute'],
};

function getCommands(agentName) {
  // Exact match
  if (AGENT_COMMANDS[agentName]) return AGENT_COMMANDS[agentName];
  // Partial match
  for (const [key, cmds] of Object.entries(AGENT_COMMANDS)) {
    if (agentName.includes(key) || key.includes(agentName)) return cmds;
  }
  return null;
}

// ── DOM ─────────────────────────────────────────────────────────────────
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const targetSelect = document.getElementById('targetAgent');
const relayUrlEl = document.getElementById('relayUrl');
const apiKeyEl = document.getElementById('apiKey');
const cmdBar = document.getElementById('cmd-bar');
const cmdButtons = document.getElementById('cmd-buttons');

function apiUrl(path) {
  return relayUrlEl.value.replace(/\/$/, '') + path;
}
function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (apiKeyEl.value) h['Authorization'] = 'Bearer ' + apiKeyEl.value;
  return h;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="role">${role}</div><div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ── API calls ───────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch(apiUrl('/status'), { headers: headers() });
    if (r.status === 401) { statusEl.textContent = '⚠ unauthorized'; return; }
    const d = await r.json();
    statusEl.textContent = `${d.hub} • ${d.peers} peers • ${d.agents} agents • ${d.capabilities} caps`;
  } catch { statusEl.textContent = 'offline'; }
}

async function loadAgents() {
  try {
    const r = await fetch(apiUrl('/mesh'), { headers: headers() });
    if (!r.ok) return;
    const d = await r.json();
    targetSelect.innerHTML = '';
    const hubs = {};
    for (const a of d.agents || []) {
      if (!hubs[a.hub]) hubs[a.hub] = [];
      hubs[a.hub].push(a);
    }
    for (const [hub, agents] of Object.entries(hubs).sort()) {
      const group = document.createElement('optgroup');
      group.label = hub;
      for (const a of agents.sort((x,y) => x.name.localeCompare(y.name))) {
        const opt = document.createElement('option');
        opt.value = `${a.name}@${a.hub}`;
        opt.textContent = a.name;
        group.appendChild(opt);
      }
      targetSelect.appendChild(group);
    }
    updateCmdBar();
  } catch { targetSelect.innerHTML = '<option value="">error</option>'; }
}

function updateCmdBar() {
  const target = targetSelect.value;
  if (!target) { cmdBar.style.display = 'none'; return; }
  const agentName = target.split('@')[0];
  const cmds = getCommands(agentName);
  if (!cmds) { cmdBar.style.display = 'none'; return; }
  cmdButtons.innerHTML = '';
  for (const cmd of cmds) {
    const btn = document.createElement('button');
    btn.textContent = cmd;
    btn.addEventListener('click', () => {
      input.value = cmd;
      input.focus();
    });
    cmdButtons.appendChild(btn);
  }
  cmdBar.style.display = 'flex';
}

async function sendTask(command, target) {
  if (!command.trim()) return;
  if (!target) { addMsg('error', 'Select a target agent first'); return; }

  addMsg('user', `${target}: ${command}`);
  const loadingDiv = addMsg('system', '<div class="loading"></div> awaiting mesh response...');
  sendBtn.disabled = true;

  try {
    const r = await fetch(apiUrl('/task'), {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ target, command, args: {}, timeout_ms: 30000 })
    });
    const d = await r.json();
    loadingDiv.remove();

    if (d.status === 'success') {
      const output = typeof d.output === 'string' ? d.output
        : (d.output?.text || JSON.stringify(d.output, null, 2));
      addMsg('system', `✓ ${d.executed_by} (${d.execution_ms}ms)\n${output}`);
    } else if (d.status === 'timeout') {
      addMsg('error', `⏱ Timeout: ${d.error}`);
    } else {
      addMsg('error', `${d.status}: ${d.error || JSON.stringify(d)}`);
    }
  } catch (e) {
    loadingDiv.remove();
    addMsg('error', `Connection failed: ${e.message}`);
  }

  sendBtn.disabled = false;
  input.focus();
}

// ── Events ──────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  const target = targetSelect.value;
  sendTask(input.value, target);
  input.value = '';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
});
targetSelect.addEventListener('change', updateCmdBar);
document.getElementById('refreshBtn').addEventListener('click', () => { checkStatus(); loadAgents(); });

// ── Init ────────────────────────────────────────────────────────────────
checkStatus();
loadAgents();
input.focus();
</script>
</body>
</html>
