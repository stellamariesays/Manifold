<!--
  Caddy route:
  handle_path /nexal/login* {
    root * /srv/manifold/federation/public/nexal
    rewrite * /login.html
    file_server
  }
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexal Network — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00e5ff;
      --violet: #aa00ff;
      --bg: #000510;
      --panel: rgba(0,10,30,0.88);
      --border: rgba(0,229,255,0.25);
      --text: #b0e0f8;
      --danger: #ff3366;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
    }

    /* Three.js background canvas */
    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      /* Start blurred/dimmed, reveal on login */
      filter: blur(12px) brightness(0.25);
      transition: filter 1.2s ease-out;
    }
    #bg-canvas.revealed {
      filter: blur(0px) brightness(1);
    }

    /* Login overlay */
    #login-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #login-overlay.hidden {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px 36px 32px;
      width: 380px;
      max-width: 90vw;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-card::after {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 6px;
      pointer-events: none;
      background:
        linear-gradient(var(--cyan), var(--cyan)) 0 0 / 20px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 0 0 / 1px 20px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 100% 0 / 20px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 100% 0 / 1px 20px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 0 100% / 20px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 0 100% / 1px 20px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 100% 100% / 20px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) 100% 100% / 1px 20px no-repeat;
      animation: cornerPulse 3s ease-in-out infinite;
    }
    @keyframes cornerPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Logo letter-by-letter animation */
    .logo-text {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--cyan);
      text-shadow: 0 0 25px var(--cyan), 0 0 50px rgba(0,229,255,0.3);
      margin-bottom: 4px;
      display: flex;
      justify-content: center;
    }
    .logo-text span {
      display: inline-block;
      opacity: 0;
      transform: translateY(-10px);
      animation: letterIn 0.4s ease forwards;
    }

    @keyframes letterIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,229,255,0.45);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .input-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0,229,255,0.6);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,10,30,0.6);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,229,255,0.15);
    }

    .input-group input.error {
      border-color: var(--danger);
      box-shadow: 0 0 12px rgba(255,51,102,0.15);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 3px;
      color: var(--cyan);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .login-btn:hover {
      background: rgba(0,229,255,0.2);
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,229,255,0.15);
    }

    .login-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 11px;
      color: var(--danger);
      margin-top: 10px;
      min-height: 16px;
    }

    .forgot-link {
      margin-top: 18px;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
    }
    .forgot-link a {
      color: rgba(0,229,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link a:hover {
      color: var(--cyan);
    }

    /* Particle burst canvas overlay */
    #burst-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #burst-canvas.active {
      opacity: 1;
    }

    /* Token expiry notice */
    .token-notice {
      font-size: 8px;
      color: rgba(255,255,255,0.2);
      margin-top: 14px;
      letter-spacing: 1px;
    }

    /* Mobile <480px */
    @media (max-width: 480px) {
      .login-card {
        width: 100%;
        max-width: 100vw;
        border-radius: 0;
        padding: 30px 24px 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .logo-text { font-size: 28px; letter-spacing: 5px; }
      .logo-sub { margin-bottom: 24px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="burst-canvas"></canvas>

<div id="login-overlay">
  <div class="login-card" id="login-card">
    <div class="logo-text" id="logo-text"></div>
    <div class="logo-sub">Numinous Architecture — Federation Mesh</div>

    <div class="input-group">
      <label>Access Code</label>
      <input type="text" id="code-input" maxlength="8" placeholder="••••••••" autocomplete="off" spellcheck="false">
    </div>

    <button class="login-btn" id="login-btn">Connect</button>
    <div class="error-msg" id="error-msg"></div>

    <div class="forgot-link">
      <a href="https://discord.com/invite/clawd" target="_blank">Forgot your code?</a>
    </div>

    <div class="token-notice">Sessions expire after 24 hours</div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>
<script type="module">
import * as THREE from 'three';

// ── Logo letter-by-letter animation ──
const logoEl = document.getElementById('logo-text');
const letters = 'MANIFOLD';
letters.split('').forEach((ch, i) => {
  const span = document.createElement('span');
  span.textContent = ch;
  span.style.animationDelay = `${0.3 + i * 0.08}s`;
  logoEl.appendChild(span);
});

// ── Three.js particle background ──
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

// Particles
const particleCount = 1200;
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);

const cyan = new THREE.Color(0x00e5ff);
const violet = new THREE.Color(0xaa00ff);

for (let i = 0; i < particleCount; i++) {
  positions[i * 3]     = (Math.random() - 0.5) * 10;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 10;

  const c = Math.random() < 0.7 ? cyan : violet;
  colors[i * 3]     = c.r;
  colors[i * 3 + 1] = c.g;
  colors[i * 3 + 2] = c.b;

  sizes[i] = Math.random() * 3 + 1;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.04,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Wireframe icosahedron
const icoGeo = new THREE.IcosahedronGeometry(1.5, 1);
const icoMat = new THREE.MeshBasicMaterial({
  color: 0x00e5ff,
  wireframe: true,
  transparent: true,
  opacity: 0.15,
});
const ico = new THREE.Mesh(icoGeo, icoMat);
scene.add(ico);

function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() / 1000;
  particles.rotation.y = t * 0.02;
  particles.rotation.x = Math.sin(t * 0.01) * 0.1;
  ico.rotation.y = t * 0.05;
  ico.rotation.x = t * 0.03;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Login logic ──
const codeInput = document.getElementById('code-input');
const loginBtn = document.getElementById('login-btn');
const errorMsg = document.getElementById('error-msg');
const overlay = document.getElementById('login-overlay');
const bgCanvas = document.getElementById('bg-canvas');
const burstCanvas = document.getElementById('burst-canvas');

async function login() {
  const code = codeInput.value.trim();
  if (code.length < 4) {
    errorMsg.textContent = 'Enter a valid access code';
    codeInput.classList.add('error');
    return;
  }
  codeInput.classList.remove('error');
  errorMsg.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = 'Connecting…';

  try {
    const res = await fetch('/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      errorMsg.textContent = data.error || 'Invalid code';
      codeInput.classList.add('error');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Connect';
      return;
    }

    // Success — particle burst + reveal
    triggerBurst();
    bgCanvas.classList.add('revealed');

    setTimeout(() => {
      overlay.classList.add('hidden');
    }, 600);

    setTimeout(() => {
      window.location.href = '/nexal/';
    }, 1800);

  } catch (err) {
    errorMsg.textContent = 'Connection failed';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Connect';
  }
}

loginBtn.addEventListener('click', login);
codeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
  if (e.key === 'Escape') { codeInput.value = ''; errorMsg.textContent = ''; codeInput.classList.remove('error'); }
});

// ── Particle burst on success ──
function triggerBurst() {
  const bCanvas = burstCanvas;
  bCanvas.classList.add('active');
  const ctx = bCanvas.getContext('2d');
  bCanvas.width = window.innerWidth;
  bCanvas.height = window.innerHeight;

  const cx = bCanvas.width / 2;
  const cy = bCanvas.height / 2;
  const burstParticles = [];

  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    burstParticles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.02 + 0.01,
      size: Math.random() * 4 + 1,
      color: Math.random() < 0.6 ? '#00e5ff' : '#aa00ff',
    });
  }

  function drawBurst() {
    ctx.clearRect(0, 0, bCanvas.width, bCanvas.height);
    let alive = false;
    burstParticles.forEach(p => {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.life -= p.decay;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    if (alive) requestAnimationFrame(drawBurst);
    else bCanvas.classList.remove('active');
  }
  drawBurst();
}
</script>
</body>
</html>
