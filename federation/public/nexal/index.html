<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexal Network — Intelligence Coordination Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00e5ff;
      --violet:  #aa00ff;
      --green:   #00ff88;
      --pink:    #ff0077;
      --gold:    #ffcc00;
      --bg:      #000510;
      --panel:   rgba(0,10,30,0.82);
      --border:  rgba(0,229,255,0.25);
      --text:    #b0e0f8;
      --accent:  #00e5ff;
      --danger:  #ff3366;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Rajdhani', 'Share Tech Mono', monospace;
      color: var(--text);
      user-select: none;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%; height: 100%;
    }

    /* ── HUD LAYER ────────────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      pointer-events: all;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(8px);
      position: absolute;
      padding: 14px 18px;
      box-shadow: 0 0 20px rgba(0,229,255,0.08), inset 0 0 30px rgba(0,5,20,0.5);
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,229,255,0.02) 2px, rgba(0,229,255,0.02) 4px
      );
      pointer-events: none;
      border-radius: 4px;
    }

    /* Title Panel */
    #title-panel {
      top: 18px; left: 20px;
      min-width: 280px;
    }

    #title-panel .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
      line-height: 1;
    }

    #title-panel .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,229,255,0.55);
      margin-top: 4px;
      text-transform: uppercase;
    }

    #title-panel .version {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      display: flex; align-items: center; gap: 8px;
    }

    #title-panel .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Agent List Panel */
    #agents-panel {
      top: 140px; left: 20px;
      width: 280px; max-height: 400px;
      overflow-y: auto;
    }

    #agents-panel .panel-title {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 8px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #agents-panel .panel-title::before {
      content: "●";
      color: var(--green);
      animation: pulse 2s infinite;
    }

    .agent-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 11px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    .agent-item .agent-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    .agent-item .agent-name {
      flex: 1; color: var(--text);
    }

    .agent-item .agent-caps {
      font-size: 9px; color: rgba(255,255,255,0.4);
    }

    /* SOPHIA Panel */
    #sophia-panel {
      bottom: 20px; left: 20px;
      width: 280px;
    }

    #sophia-panel .sophia-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--violet);
      margin-bottom: 8px;
      letter-spacing: 4px;
      text-shadow: 0 0 15px var(--violet);
    }

    #sophia-panel .sophia-subtitle {
      font-size: 9px;
      color: rgba(170,0,255,0.6);
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .sophia-controls {
      display: flex; gap: 8px;
    }

    .sophia-btn {
      padding: 6px 12px;
      background: rgba(170,0,255,0.15);
      border: 1px solid rgba(170,0,255,0.3);
      border-radius: 3px;
      color: var(--violet);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .sophia-btn:hover {
      background: rgba(170,0,255,0.25);
      border-color: var(--violet);
    }

    /* Right Status Panel */
    #status-panel {
      top: 18px; right: 20px;
      width: 320px;
    }

    #status-panel .status-title {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; font-size: 11px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    .status-label { color: rgba(255,255,255,0.7); }
    .status-value { color: var(--text); font-weight: 600; }

    /* Agent Detail Panel */
    #detail-panel {
      top: 200px; right: 20px;
      width: 320px;
      display: none;
    }

    #detail-panel.visible {
      display: block;
    }

    .detail-title {
      font-size: 18px;
      color: var(--cyan);
      margin-bottom: 8px;
    }

    .detail-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-stat {
      text-align: center;
      padding: 8px;
      background: rgba(0,229,255,0.05);
      border-radius: 3px;
    }

    .detail-stat .stat-num {
      font-size: 16px;
      color: var(--cyan);
      display: block;
    }

    .detail-stat .stat-label {
      font-size: 8px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>

<!-- HUD Overlay -->
<div id="hud">
  <!-- Title Panel -->
  <div id="title-panel" class="panel">
    <div class="logo">MANIFOLD</div>
    <div class="sub">Numinous Architecture — Federation Mesh</div>
    <div class="version">
      <div class="status-dot"></div>
      <span>Relay connected: nexal.network</span>
    </div>
  </div>

  <!-- Active Agents Panel -->
  <div id="agents-panel" class="panel">
    <div class="panel-title">Active Agents</div>

    </div>
  </div>

  <!-- SOPHIA Panel -->
  <div id="sophia-panel" class="panel">
    <div class="sophia-title">SOPHIA</div>
    <div class="sophia-subtitle">Create Creation 10</div>
    <div class="sophia-controls">
      <button class="sophia-btn">Navigate</button>
      <button class="sophia-btn">Initiate</button>
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel" class="panel">
    <div class="status-title">Federation Status</div>
    <div class="status-row">
      <span class="status-label">Agents Online</span>
      <span class="status-value" id="agent-count">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">Capabilities</span>

    </div>
    <div class="status-row">
      <span class="status-label">Mesh Latency</span>
      <span class="status-value">23ms</span>
    </div>
    <div class="status-row">
      <span class="status-label">Messages / Sec</span>
      <span class="status-value">135/s</span>
    </div>
    <div class="status-row">
      <span class="status-label">Uptime</span>
      <span class="status-value">99.97%</span>

    <div class="status-row">
      <span class="status-label">Relay</span>

  <!-- Agent Detail Panel -->
  <div id="detail-panel" class="panel">
    <div class="detail-title" id="detail-agent-name">Agent Name</div>

    <div class="detail-stats">
      <div class="detail-stat">
        <span class="stat-num" id="detail-messages">-</span>
        <span class="stat-label">Messages</span>
      </div>
      <div class="detail-stat">
        <span class="stat-num" id="detail-uptime">-</span>
        <span class="stat-label">Uptime</span>
      </div>
    </div>
    <div id="detail-capabilities"></div>
  </div>
</div>

<!-- 3D Scene -->
<canvas id="scene"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
window.THREE = THREE;

// ──────── GEOMETRY FUNCTIONS ────────────────────────────────────
function makeKleinBottleGeometry(scale = 1, segments = 32) {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const indices = [];
  
  const uSteps = segments;
  const vSteps = segments;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = (j / vSteps) * Math.PI * 2;
      
      const a = 3, n = 2;
      const x = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.cos(u / n);
      const y = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.sin(u / n);
      const z = Math.sin(u / 2) * Math.sin(v) + Math.cos(u / 2) * Math.sin(2 * v);
      
      vertices.push(x * scale * 0.3, y * scale * 0.3, z * scale * 0.3);
    }
  }
  
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = (i + 1) * (vSteps + 1) + j;
      const c = (i + 1) * (vSteps + 1) + j + 1;
      const d = i * (vSteps + 1) + j + 1;
      
      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }
  
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

function makeMobiusStripGeometry(radius = 1, width = 0.5, segments = 64) {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const indices = [];
  
  const uSteps = segments;
  const vSteps = 8;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = ((j / vSteps) - 0.5) * width;
      
      const x = (radius + v * Math.cos(u / 2)) * Math.cos(u);
      const y = (radius + v * Math.cos(u / 2)) * Math.sin(u);
      const z = v * Math.sin(u / 2);
      
      vertices.push(x, y, z);
    }
  }
  
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = (i + 1) * (vSteps + 1) + j;
      const c = (i + 1) * (vSteps + 1) + j + 1;
      const d = i * (vSteps + 1) + j + 1;
      
      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }
  
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

// ──────── MAIN SETUP ────────────────────────────────────────
let scene, camera, renderer;
let agentGroups = [];
let clickableObjects = [];

function init() {
  // Scene setup
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000510);
  
  const canvas = document.getElementById('scene');
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  
  // Camera position
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 0, 0);
  
  // Store camera globally for mouse interaction
  window.camera = camera;
  
  // Camera controls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 5;
  controls.maxDistance = 50;
  controls.minPolarAngle = 0;
  controls.maxPolarAngle = Math.PI;
  controls.autoRotate = false;
  controls.enablePan = true;
  controls.enableZoom = true;
  controls.enableRotate = true;
  
  // Store controls globally for animation loop
  window.cameraControls = controls;
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0x1a2a40, 0.4);
  scene.add(ambientLight);
  
  const directionalLight = new THREE.DirectionalLight(0x4499ff, 0.8);
  directionalLight.position.set(10, 10, 5);
  directionalLight.castShadow = true;
  directionalLight.shadow.mapSize.width = 2048;
  directionalLight.shadow.mapSize.height = 2048;
  scene.add(directionalLight);
  
  // Load agents and build scene
  loadAgentsAndBuild();
}

async function loadAgentsAndBuild() {
  let agents = [];
  
  try {
    const response = await fetch('/api/mesh');
    const meshData = await response.json();
    if (meshData && meshData.agents) {
      agents = meshData.agents;
    }
  } catch (e) {
    console.log('Using demo agents (API offline)');
    // Demo agents in proper hub clusters
    agents = [
      // HOG Hub (green)
      { id: 'solar-detect', hub: 'hog', capabilities: ['monitoring'], position: [-8, 2, -2] },
      { id: 'solar-sites', hub: 'hog', capabilities: ['web-deploy'], position: [-6, 0, -1] },
      { id: 'cron-monitor', hub: 'hog', capabilities: ['scheduling'], position: [-7, -1, 0] },
      
      // TRILLIAN Hub (purple)
      { id: 'stella', hub: 'trillian', capabilities: ['guidance'], position: [6, 3, 0] },
      { id: 'manifold', hub: 'trillian', capabilities: ['topology'], position: [8, 1, 1] },
      { id: 'argue', hub: 'trillian', capabilities: ['debate'], position: [7, 0, -2] },
      { id: 'braid', hub: 'trillian', capabilities: ['solar-prediction'], position: [5, 2, 2] },
      
      // THEFOG Hub (purple)
      { id: 'void-watcher', hub: 'thefog', capabilities: ['void-scan'], position: [0, 4, 8] },
      { id: 'reach-scanner', hub: 'thefog', capabilities: ['mesh-probe'], position: [-1, 3, 6] },
      { id: 'sentry', hub: 'thefog', capabilities: ['monitoring'], position: [1, 5, 7] },
      { id: 'sophia', hub: 'thefog', capabilities: ['void-depth'], position: [0, 6, 5] }
    ];
  }
  
  buildSpiderWeb();
  buildAgentTopologies(agents);
  buildCentralNexus();
  updateAgentsList(agents);
  updateStatusPanel(agents);
  
  animate();
}

function buildSpiderWeb() {
  const webGroup = new THREE.Group();
  webGroup.position.set(0, -3, 0);
  
  const spokes = 8;
  const rings = 4;
  const outerR = 12;
  const webRings = [];
  
  // Concentric rings with wave capability
  for (let r = 1; r <= rings; r++) {
    const radius = (r / rings) * outerR;
    const segmentCount = 64;
    const positions = new Float32Array((segmentCount + 1) * 3);
    const originalPositions = new Float32Array((segmentCount + 1) * 3);
    
    for (let i = 0; i <= segmentCount; i++) {
      const angle = (i / segmentCount) * Math.PI * 2;
      const x = Math.cos(angle) * radius;
      const y = 0; // Will be modified by waves
      const z = Math.sin(angle) * radius;
      
      const i3 = i * 3;
      positions[i3] = x;
      positions[i3 + 1] = y;
      positions[i3 + 2] = z;
      
      originalPositions[i3] = x;
      originalPositions[i3 + 1] = y;
      originalPositions[i3 + 2] = z;
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.LineBasicMaterial({ 
      color: 0x2a4a6a, 
      transparent: true, 
      opacity: 0.3 
    });
    
    const line = new THREE.Line(geometry, material);
    line.userData = { 
      originalPositions,
      radius,
      segmentCount,
      ringIndex: r
    };
    
    webRings.push(line);
    webGroup.add(line);
  }
  
  // Radial spokes
  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2;
    const points = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(
        Math.cos(angle) * outerR,
        0,
        Math.sin(angle) * outerR
      )
    ];
    
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ 
      color: 0x1a3a5a, 
      transparent: true, 
      opacity: 0.4 
    });
    const line = new THREE.Line(geometry, material);
    webGroup.add(line);
  }
  
  scene.add(webGroup);
  
  // Store references for wave animation
  window._webGroup = webGroup;
  window._webRings = webRings;
}

function buildAgentTopologies(agents) {
  const hubColors = {
    'relay': 0x00e5ff,
    'hog': 0x00ff88,
    'trillian': 0xaa00ff,
    'thefog': 0x8800ff
  };
  
  // Define hub center positions in 3D space
  const hubCenters = {
    'hog': { x: -8, y: 2, z: -6 },
    'trillian': { x: 8, y: 3, z: 2 },
    'thefog': { x: -2, y: 5, z: 8 },
    'relay': { x: 6, y: 1, z: -8 }
  };
  
  // Group agents by hub for orbital assignment
  const agentsByHub = {};
  agents.forEach(agent => {
    if (!agentsByHub[agent.hub]) {
      agentsByHub[agent.hub] = [];
    }
    agentsByHub[agent.hub].push(agent);
  });
  
  agents.forEach((agent, idx) => {
    const group = new THREE.Group();
    
    const hubColor = hubColors[agent.hub] || 0x666666;
    const scale = 0.8 + Math.random() * 0.4;
    
    // Alternate topologies
    let formGeo;
    if (idx % 2 === 0) {
      formGeo = makeKleinBottleGeometry(scale, 20);
      agent.topologyType = 'kleinBottle';
    } else {
      formGeo = makeMobiusStripGeometry(scale * 1.2, scale * 0.5, 40);
      agent.topologyType = 'mobiusStrip';
    }
    
    // Main form
    const formMat = new THREE.MeshPhongMaterial({
      color: 0x1a3a55,
      emissive: new THREE.Color(hubColor).multiplyScalar(0.03),
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
    });
    const formMesh = new THREE.Mesh(formGeo, formMat);
    formMesh.castShadow = true;
    formMesh.userData = { type: 'agent', agent, idx };
    clickableObjects.push(formMesh);
    group.add(formMesh);
    
    // Wireframe
    const wfMat = new THREE.MeshBasicMaterial({
      color: hubColor,
      wireframe: true,
      transparent: true,
      opacity: 0.6,
    });
    const wfMesh = new THREE.Mesh(formGeo, wfMat);
    group.add(wfMesh);
    
    // Central core
    const coreGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const coreMat = new THREE.MeshPhongMaterial({
      color: hubColor,
      emissive: hubColor,
      emissiveIntensity: 0.6,
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);
    
    // Orbital positioning around hub centers
    const hubCenter = hubCenters[agent.hub] || { x: 0, y: 0, z: 0 };
    const hubAgents = agentsByHub[agent.hub];
    const agentIndexInHub = hubAgents.indexOf(agent);
    const agentsInHub = hubAgents.length;
    
    // Orbital parameters
    const orbitRadius = 1.5 + (agentIndexInHub % 3) * 0.8; // Varied orbit distances
    const orbitAngle = (agentIndexInHub / agentsInHub) * Math.PI * 2;
    const orbitHeight = Math.sin(agentIndexInHub * 0.7) * 0.5;
    
    // Calculate orbital position
    const orbitalX = hubCenter.x + Math.cos(orbitAngle) * orbitRadius;
    const orbitalY = hubCenter.y + orbitHeight;
    const orbitalZ = hubCenter.z + Math.sin(orbitAngle) * orbitRadius;
    
    group.position.set(orbitalX, orbitalY, orbitalZ);
    
    // Store orbital parameters for animation
    const orbitSpeed = 0.2 + Math.random() * 0.3; // Varied orbital speeds
    const orbitDirection = Math.random() > 0.5 ? 1 : -1; // Random direction
    
    // Random orientation
    group.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    
    group.userData = { 
      agent, 
      idx,
      hubCenter,
      orbitRadius,
      baseOrbitAngle: orbitAngle,
      orbitHeight,
      orbitSpeed,
      orbitDirection,
      agentIndexInHub
    };
    
    scene.add(group);
    agentGroups.push(group);
  });
  
  // Create visual markers for hub centers
  Object.entries(hubCenters).forEach(([hubName, center]) => {
    const hubMarkerGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const hubColor = hubColors[hubName] || 0x666666;
    const hubMarkerMat = new THREE.MeshPhongMaterial({
      color: hubColor,
      emissive: hubColor,
      emissiveIntensity: 0.3,
      transparent: true,
      opacity: 0.6,
    });
    
    const hubMarker = new THREE.Mesh(hubMarkerGeo, hubMarkerMat);
    hubMarker.position.set(center.x, center.y, center.z);
    
    // Add subtle pulsing animation reference and hub info
    hubMarker.userData = { 
      type: 'hub', 
      hubName, 
      isHubCenter: true,
      hubInfo: {
        name: hubName,
        color: `#${hubColor.toString(16).padStart(6, '0')}`,
        center: center,
        description: getHubDescription(hubName)
      }
    };
    
    // Make hub markers clickable
    clickableObjects.push(hubMarker);
    scene.add(hubMarker);
    
    // Store hub markers for potential animation
    agentGroups.push(hubMarker);
  });
}

function getHubDescription(hubName) {
  const descriptions = {
    'hog': 'Development & Monitoring Hub - System health, data detection, solar monitoring, and deployment management.',
    'trillian': 'Guidance & Strategy Hub - Leadership, decision-making, manifold topology, and strategic coordination.',
    'thefog': 'Mystical Computation Hub - Void scanning, deep analysis, and advanced computational research within Sophia\'s realm.',
    'relay': 'Network Coordination Hub - Federation relay, communications, and inter-hub connectivity management.'
  };
  return descriptions[hubName] || 'Unknown hub configuration.';
}

  followMouse: true,       // Mouse interaction
  whiteNodes: true,        // Node color scheme

  // Mouse proximity shrinking

  shrinkRadius: 6.0,       // Distance at which shrinking starts
  minShrinkScale: 0.3,     // Minimum scale when mouse is very close
  
  // Particle emissions (20% slower overall)
  particleEmissions: true, // Enable particle emissions to hubs
  emissionInterval: 1000,  // Emit particles every 1000ms (1.0 seconds) - 20% slower
  particlesPerEmission: 2, // Number of particles per emission burst
  particleSpeed: 0.012,    // Speed of particle travel to hubs (20% slower)
  particleSize: 0.05,      // Visual size of particles
  
  // Mesh stretching during emissions (20% slower)
  meshStretch: true,       // Enable mesh stretching toward emission targets
  stretchMagnitude: 1.8,   // How far nodes stretch toward targets
  stretchDuration: 2500,   // How long stretch effect lasts (ms) - 20% slower decay

  // Sophia's "thefog" connection preference

  thefogDurationBoost: 1.6, // Thefog connections linger 60% longer
  thefogConcentration: 0.65, // Much tighter diameter - only 35% of nodes (was 40%)

  // System

};

function buildCentralNexus() {
  // Sophia's Realm: Dynamic Constraint Network
  const constraintGroup = new THREE.Group();
  constraintGroup.position.set(0, 1, 0);
  // Initialize constraint network nodes
  const nodes = [];
  const constraints = [];
  
  // Create nodes in organic formation
  for (let i = 0; i < CONSTRAINT_CONFIG.nodeCount; i++) {
    // Create node with physics properties
    const node = {
      // Position
      x: (Math.random() - 0.5) * 4,
      y: (Math.random() - 0.5) * 3,
      z: (Math.random() - 0.5) * 4,
      
      // Velocity
      vx: 0,
      vy: 0,
      vz: 0,
      
      // Original position (for constraints)
      ox: 0,
      oy: 0,
      oz: 0,
      
      // Properties
      mass: 1,
      fixed: false,
      id: i
    };
    
    // Set original position
    node.ox = node.x;
    node.oy = node.y;
    node.oz = node.z;
    
    nodes.push(node);
  }
  
  // Create constraints between nearby nodes
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const nodeA = nodes[i];
      const nodeB = nodes[j];
      
      const dx = nodeA.x - nodeB.x;
      const dy = nodeA.y - nodeB.y;
      const dz = nodeA.z - nodeB.z;
      const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
      
      if (distance < CONSTRAINT_CONFIG.connectionDistance) {
        constraints.push({
          nodeA: i,
          nodeB: j,
          restLength: distance
        });
      }
    }
  }
  
  // Create visual nodes
  const nodeGeometry = new THREE.SphereGeometry(CONSTRAINT_CONFIG.nodeSize, 8, 8);
  const nodeMaterial = new THREE.MeshPhongMaterial({
    color: CONSTRAINT_CONFIG.whiteNodes ? 0xffffff : 0x4400aa,
    emissive: CONSTRAINT_CONFIG.whiteNodes ? 0x222222 : 0x220044,
    emissiveIntensity: CONSTRAINT_CONFIG.whiteNodes ? 0.1 : 0.1,
    transparent: true,
    opacity: CONSTRAINT_CONFIG.nodeOpacity,
  });
  
  const nodeInstances = [];
  nodes.forEach((node, i) => {
    // Clone material for each node to allow individual opacity changes
    const individualMaterial = nodeMaterial.clone();
    const nodeMesh = new THREE.Mesh(nodeGeometry, individualMaterial);
    nodeMesh.position.set(node.x, node.y, node.z);
    nodeInstances.push(nodeMesh);
    constraintGroup.add(nodeMesh);
  });
  
  // Create constraint lines
  const lineGeometry = new THREE.BufferGeometry();
  const linePositions = new Float32Array(constraints.length * 6); // 2 points per constraint * 3 coords
  
  const lineMaterial = new THREE.LineBasicMaterial({
    color: 0x333333, // Dark grey/charcoal
    transparent: true,
    opacity: CONSTRAINT_CONFIG.lineOpacity,
  });
  
  constraints.forEach((constraint, i) => {
    const nodeA = nodes[constraint.nodeA];
    const nodeB = nodes[constraint.nodeB];
    const i6 = i * 6;
    
    linePositions[i6] = nodeA.x;
    linePositions[i6 + 1] = nodeA.y;
    linePositions[i6 + 2] = nodeA.z;
    linePositions[i6 + 3] = nodeB.x;
    linePositions[i6 + 4] = nodeB.y;
    linePositions[i6 + 5] = nodeB.z;
  });
  
  lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const constraintLines = new THREE.LineSegments(lineGeometry, lineMaterial);
  constraintGroup.add(constraintLines);
  
  // Create ground reflection if enabled
  if (CONSTRAINT_CONFIG.reflectedGround) {
    const groundGeometry = new THREE.PlaneGeometry(20, 20);
    const groundMaterial = new THREE.MeshPhongMaterial({
      color: 0x001122,
      transparent: true,
      opacity: 0.1,
      side: THREE.DoubleSide,
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    constraintGroup.add(ground);
  }
  
  // Initial dramatic scale - starts huge and shrinks down
  const initialScale = 25.0; // Start 25x larger than normal (more dramatic)
  constraintGroup.scale.setScalar(initialScale);
  console.log('Constraint group initialized with scale:', initialScale);
  
  scene.add(constraintGroup);
  
  // Populate hub positions for particle targeting
  const hubCenters = {
    'hog': { x: -8, y: 2, z: -6 },
    'trillian': { x: 8, y: 3, z: 2 },
    'thefog': { x: -2, y: 5, z: 8 }, // Sophia's realm
    'relay': { x: 6, y: 1, z: -8 }
  };
  
  // Create named hub arrays for weighted selection
  const hubNames = Object.keys(hubCenters);
  const hubPositions = hubNames.map(name => ({
    name: name,
    position: new THREE.Vector3(hubCenters[name].x, hubCenters[name].y, hubCenters[name].z),
    isThefog: name === 'thefog'
  }));

  // Store references for animation and mouse interaction
  window._constraintSystem = {
    group: constraintGroup,
    nodes: nodes,
    constraints: constraints,
    nodeInstances: nodeInstances,
    constraintLines: constraintLines,
    mousePosition: new THREE.Vector3(),
    raycaster: new THREE.Raycaster(),
    mouse: new THREE.Vector2(),
    
    // Animation state
    startTime: null, // Will be set when animation loop first runs
    introAnimation: true,
    initialScale: initialScale,
    targetScale: 1.0,
    introDuration: 2000, // 2 seconds
    mouseInteractionEnabled: false, // Enabled after 2.2 seconds
    mouseEnableTime: 2200, // 2.2 seconds
    frameCount: 0, // For debug logging
    
    // Proximity scaling
    currentScale: 1.0,
    targetProximityScale: 1.0,
    
    // Particle system
    particles: [],
    lastEmissionTime: 0,
    hubPositions: hubPositions, // Named hub positions with thefog identification
    particleGroup: new THREE.Group(), // Container for particle meshes
    
    // Mesh stretching system
    originalNodePositions: nodes.map(node => ({ x: node.x, y: node.y, z: node.z })), // Store original positions
    activeStretchEffects: [], // Array of active stretch effects { direction, strength, decay, startTime }
    stretchTargets: [] // Current stretch target positions for smooth interpolation
  };
  
  // Add particle group to scene
  scene.add(window._constraintSystem.particleGroup);
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  const elapsed = performance.now() / 1000;
  
  // Animate agents and hub centers
  agentGroups.forEach((group, idx) => {
    const userData = group.userData;
    
    if (userData && userData.isHubCenter) {
      // Animate hub center markers with subtle pulsing
      const pulse = 1 + Math.sin(elapsed * 2 + idx) * 0.15;
      group.scale.setScalar(pulse);
      
    } else if (userData && userData.hubCenter) {
      // Animate agents in orbital motion around hub centers
      const orbitTime = elapsed * userData.orbitSpeed * userData.orbitDirection;
      const currentAngle = userData.baseOrbitAngle + orbitTime;
      
      // Update orbital position
      const orbitalX = userData.hubCenter.x + Math.cos(currentAngle) * userData.orbitRadius;
      const orbitalZ = userData.hubCenter.z + Math.sin(currentAngle) * userData.orbitRadius;
      const orbitalY = userData.hubCenter.y + userData.orbitHeight + Math.sin(elapsed * 0.5 + userData.agentIndexInHub) * 0.1;
      
      group.position.set(orbitalX, orbitalY, orbitalZ);
      
      // Continue topology rotation
      group.rotation.y += 0.005 + idx * 0.001;
      group.rotation.x += 0.003;
    }
  });
  
  // Animate Sophia's Realm (The Fog)
  if (window._centralSphere) {
    // Gentle rotation of entire fog system
    window._centralSphere.rotation.y += 0.003;
    window._centralSphere.rotation.x += 0.001;
  }
  
  // Animate constraint network physics
  if (window._constraintSystem) {
    const system = window._constraintSystem;
    
    // Increment frame counter for debug logging (needs to be outside intro check)
    system.frameCount++;
    
    // Handle intro animation - shrink from huge to normal size
    if (system.introAnimation) {
      const currentTime = performance.now();
      
      // Initialize start time on first frame
      if (system.startTime === null) {
        system.startTime = currentTime;
        console.log('Starting intro animation at scale:', system.initialScale);
      }
      
      const elapsedIntro = currentTime - system.startTime;
      
      if (elapsedIntro < system.introDuration) {
        // Smooth easing from initial scale to target scale
        const progress = elapsedIntro / system.introDuration;
        const easeOut = 1 - Math.pow(1 - progress, 3); // Cubic ease-out
        const currentScale = system.initialScale + (system.targetScale - system.initialScale) * easeOut;
        system.group.scale.setScalar(currentScale);
      } else {
        // Animation complete - set final scale and switch to stable mode
        system.group.scale.setScalar(system.targetScale);
        system.currentScale = system.targetScale; // Initialize proximity scaling
        system.introAnimation = false;
        console.log('Intro animation complete - switching to stable mode');
        
        // Make physics more stable/still after intro
        CONSTRAINT_CONFIG.springStrength = CONSTRAINT_CONFIG.stableSpringStrength;
        CONSTRAINT_CONFIG.damping = CONSTRAINT_CONFIG.stableDamping;
        
        // Enable mouse interaction immediately after intro completes
        if (!system.mouseInteractionEnabled) {
          system.mouseInteractionEnabled = true;
          console.log('Mouse interaction enabled after intro completion');
        }
      }
    }
    const nodes = system.nodes;
    const constraints = system.constraints;
    
    // Black hole mouse interaction (if enabled and after delay)
    if (CONSTRAINT_CONFIG.followMouse && system.mousePosition && system.mouseInteractionEnabled) {
      let nodesAffected = 0;
      
      // Create black hole effect - strong attractive force toward mouse
      nodes.forEach(node => {
        const dx = system.mousePosition.x - node.x;
        const dy = system.mousePosition.y - node.y;
        const dz = system.mousePosition.z - node.z;
        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
        
        if (distance < CONSTRAINT_CONFIG.mouseRadius && distance > 0.1) {
          nodesAffected++;
          
          // Strong attractive force (black hole effect)
          // Force increases as nodes get closer to the "event horizon"
          const eventHorizon = 0.5;
          const forceMultiplier = distance < eventHorizon ? 10.0 : 1.0;
          const force = (CONSTRAINT_CONFIG.mouseForce / (distance + 0.5)) * forceMultiplier;
          
          // Pull nodes toward mouse position (attractive force)
          const normalizedDx = dx / distance;
          const normalizedDy = dy / distance;
          const normalizedDz = dz / distance;
          
          node.vx += normalizedDx * force * 0.05;
          node.vy += normalizedDy * force * 0.05;
          node.vz += normalizedDz * force * 0.05;
        }
      });
      
      // Debug: Log affected nodes count every 60 frames
      if (system.frameCount % 60 === 0 && nodesAffected > 0) {
        console.log('Black hole affecting', nodesAffected, 'nodes');
      }
    }
    
    // Proximity-based shrinking effect (only after intro animation completes)
    if (CONSTRAINT_CONFIG.shrinkOnProximity && system.mousePosition && system.mouseInteractionEnabled && !system.introAnimation) {
      // Calculate distance from mouse to constraint system center
      const systemCenter = system.group.position;
      const mouseDistance = system.mousePosition.distanceTo(systemCenter);
      
      // Calculate target scale based on mouse proximity
      if (mouseDistance < CONSTRAINT_CONFIG.shrinkRadius) {
        const proximityRatio = mouseDistance / CONSTRAINT_CONFIG.shrinkRadius;
        system.targetProximityScale = CONSTRAINT_CONFIG.minShrinkScale + 
          (1.0 - CONSTRAINT_CONFIG.minShrinkScale) * proximityRatio;
      } else {
        system.targetProximityScale = 1.0;
      }
      
      // Smoothly interpolate to target scale
      const lerpFactor = 0.05;
      system.currentScale += (system.targetProximityScale - system.currentScale) * lerpFactor;
      system.group.scale.setScalar(system.currentScale);
      
      // Debug: Log shrinking effect every 60 frames
      if (system.frameCount % 60 === 0 && system.currentScale < 0.95) {
        console.log('Proximity shrinking - scale:', system.currentScale.toFixed(2), 'distance:', mouseDistance.toFixed(2));
      }
    }
    
    // Particle emission system (only after intro animation completes)
    if (CONSTRAINT_CONFIG.particleEmissions && system.hubPositions.length > 0 && !system.introAnimation) {
      const currentTime = performance.now();
      
      // Emit new particles every interval
      if (currentTime - system.lastEmissionTime >= CONSTRAINT_CONFIG.emissionInterval) {
        system.lastEmissionTime = currentTime;
        
        // Collect unique target hubs for this emission burst
        const targetHubs = [];
        
        // Create particles for this emission burst
        for (let i = 0; i < CONSTRAINT_CONFIG.particlesPerEmission; i++) {
          // Weighted hub selection favoring thefog (Sophia's realm)
          let targetHub;
          let targetHubIndex;
          
          if (Math.random() < CONSTRAINT_CONFIG.thefogPreference) {
            // Prefer thefog (Sophia's realm)
            const thefogHub = system.hubPositions.find(hub => hub.isThefog);
            if (thefogHub) {
              targetHub = thefogHub;
              targetHubIndex = system.hubPositions.indexOf(thefogHub);
            } else {
              // Fallback if thefog not found
              targetHubIndex = Math.floor(Math.random() * system.hubPositions.length);
              targetHub = system.hubPositions[targetHubIndex];
            }
          } else {
            // Random hub selection
            targetHubIndex = Math.floor(Math.random() * system.hubPositions.length);
            targetHub = system.hubPositions[targetHubIndex];
          }
          
          targetHubs.push({ 
            index: targetHubIndex, 
            hubInfo: targetHub, 
            position: targetHub.position 
          });
          
          // Create particle mesh - purple glow for thefog, cyan for others
          const particleGeometry = new THREE.SphereGeometry(CONSTRAINT_CONFIG.particleSize, 8, 6);
          const particleColor = targetHub.isThefog ? 0x8800ff : 0x00e5ff; // Purple for thefog
          const particleMaterial = new THREE.MeshBasicMaterial({ 
            color: particleColor, 
            transparent: true, 
            opacity: 0.8 
          });
          const particleMesh = new THREE.Mesh(particleGeometry, particleMaterial);
          
          // Start at constraint system center
          particleMesh.position.copy(system.group.position);
          
          // Store particle data
          const particle = {
            mesh: particleMesh,
            startPos: system.group.position.clone(),
            targetPos: targetHub.position.clone(),
            progress: 0.0,
            speed: CONSTRAINT_CONFIG.particleSpeed,
            targetHubIndex: targetHubIndex,
            isThefog: targetHub.isThefog
          };
          
          system.particles.push(particle);
          system.particleGroup.add(particleMesh);
        }
        
        // Create mesh stretch effects toward emission targets
        if (CONSTRAINT_CONFIG.meshStretch && targetHubs.length > 0) {
          targetHubs.forEach(targetHub => {
            // Calculate direction from constraint center to hub
            const systemCenter = system.group.position;
            const stretchDirection = new THREE.Vector3()
              .copy(targetHub.position)
              .sub(systemCenter)
              .normalize();
            
            // Apply thefog boost for Sophia's realm connections
            const baseStrength = CONSTRAINT_CONFIG.stretchMagnitude;
            const baseDuration = CONSTRAINT_CONFIG.stretchDuration;
            const isThefogConnection = targetHub.hubInfo.isThefog;
            
            const effectiveStrength = isThefogConnection ? 
              baseStrength * CONSTRAINT_CONFIG.thefogStretchBoost : 
              baseStrength;
              
            const effectiveDuration = isThefogConnection ?
              baseDuration * CONSTRAINT_CONFIG.thefogDurationBoost :
              baseDuration;
            
            // Create stretch effect with enhanced reach toward hub centers
            const stretchEffect = {
              direction: stretchDirection,
              strength: effectiveStrength,
              startTime: currentTime,
              duration: effectiveDuration, // Longer duration for thefog
              buildup: 0.0, // Start at 0, build up gradually
              decay: 1.0, // Will decay from 1.0 to 0.0 after buildup completes
              buildupPhase: true, // Currently building up strength
              buildupDuration: effectiveDuration * 0.5, // 50% of total time for gradual buildup
              hubTarget: targetHub.position.clone(), // Store actual hub position for closer reach
              isThefog: isThefogConnection,
              concentrated: isThefogConnection // Flag for tighter diameter
            };
            
            system.activeStretchEffects.push(stretchEffect);
          });
        }
        
        // Debug: Log particle emission with thefog preference tracking
        const thefogCount = targetHubs.filter(hub => hub.hubInfo.isThefog).length;
        if (system.frameCount % 180 === 0) { // Every 3 seconds
          console.log('Emitted', CONSTRAINT_CONFIG.particlesPerEmission, 'particles. Active:', system.particles.length, 
                      '| thefog:', thefogCount, '/', targetHubs.length);
        }
      }
      
      // Update existing particles
      system.particles = system.particles.filter(particle => {
        particle.progress += particle.speed;
        
        if (particle.progress >= 1.0) {
          // Particle reached destination - remove it
          system.particleGroup.remove(particle.mesh);
          return false;
        } else {
          // Update particle position along path
          particle.mesh.position.lerpVectors(particle.startPos, particle.targetPos, particle.progress);
          return true;
        }
      });
    }
    
    // Mesh stretching animation (apply before constraint physics)
    if (CONSTRAINT_CONFIG.meshStretch && system.activeStretchEffects.length > 0) {
      const currentTime = performance.now();
      
      // Update and filter active stretch effects with gradual buildup
      system.activeStretchEffects = system.activeStretchEffects.filter(effect => {
        const elapsed = currentTime - effect.startTime;
        const progress = elapsed / effect.duration;
        
        if (progress >= 1.0) {
          // Effect expired
          return false;
        } else {
          if (effect.buildupPhase) {
            // Gradual buildup phase
            const buildupProgress = Math.min(elapsed / effect.buildupDuration, 1.0);
            effect.buildup = buildupProgress * CONSTRAINT_CONFIG.stretchSpeed;
            
            if (buildupProgress >= 1.0) {
              effect.buildupPhase = false;
              effect.buildup = 1.0;
            }
          } else {
            // Decay phase (smooth ease-out curve)
            const decayStart = effect.buildupDuration;
            const decayElapsed = elapsed - decayStart;
            const decayDuration = effect.duration - decayStart;
            const decayProgress = decayElapsed / decayDuration;
            effect.decay = 1.0 - (decayProgress * decayProgress); // Quadratic ease-out
          }
          return true;
        }
      });
      
      // Apply stretch effects to node positions
      system.nodes.forEach((node, i) => {
        const originalPos = system.originalNodePositions[i];
        
        // Initialize lightening for this frame
        node.lightening = 0;
        
        // Calculate total stretch displacement from all active effects
        let totalStretchX = 0;
        let totalStretchY = 0;
        let totalStretchZ = 0;
        
        // Apply all active stretch effects
        system.activeStretchEffects.forEach(effect => {
          // Calculate how much this node should be displaced toward hub target
          const nodeFromCenter = new THREE.Vector3(originalPos.x, originalPos.y, originalPos.z);
          const dot = nodeFromCenter.dot(effect.direction);
          
          // Only stretch nodes that are in the positive direction of stretch
          if (dot > 0) {
            // For thefog (concentrated streams), only affect nodes more aligned with direction
            let participates = true;
            if (effect.concentrated) {
              // Tighter diameter - only nodes with strong directional alignment participate
              const alignmentThreshold = CONSTRAINT_CONFIG.thefogConcentration;
              const nodeDistance = nodeFromCenter.length();
              const alignment = nodeDistance > 0 ? dot / nodeDistance : 0;
              participates = alignment > alignmentThreshold;
              
              // Further reduce participation for thefog (25% fewer strands)
              if (participates && Math.random() > CONSTRAINT_CONFIG.thefogParticipation) {
                participates = false;
              }
            }
            
            if (participates) {
              // Use buildup for gradual stretch, then decay for pullback
              const currentStrength = effect.buildupPhase ? 
                effect.strength * effect.buildup : 
                effect.strength * effect.decay;
              
              // Enhanced stretching that pulls nodes closer to actual hub centers
              const baseStretchAmount = dot * currentStrength;
              
              // Additional pull toward exact hub position for closer reach
              const hubDirection = new THREE.Vector3()
                .copy(effect.hubTarget)
                .sub(new THREE.Vector3(originalPos.x, originalPos.y, originalPos.z))
                .normalize();
              
              const hubPull = baseStretchAmount * 0.3; // 30% additional pull toward hub center
              
              const stretchX = effect.direction.x * baseStretchAmount + hubDirection.x * hubPull;
              const stretchY = effect.direction.y * baseStretchAmount + hubDirection.y * hubPull;
              const stretchZ = effect.direction.z * baseStretchAmount + hubDirection.z * hubPull;
              
              totalStretchX += stretchX;
              totalStretchY += stretchY;
              totalStretchZ += stretchZ;
              
              // Calculate lighting effect intensity based on stretch amount
              if (CONSTRAINT_CONFIG.stretchLighting) {
                const stretchMagnitude = Math.sqrt(stretchX*stretchX + stretchY*stretchY + stretchZ*stretchZ);
                const lightening = Math.min(stretchMagnitude / (effect.strength * 0.5), 1.0) * CONSTRAINT_CONFIG.maxLightening;
                node.lightening = Math.max(node.lightening || 0, lightening);
              }
            }
          }
        });
        
        // Apply stretch displacement as offset from physics position
        node.stretchX = totalStretchX;
        node.stretchY = totalStretchY;
        node.stretchZ = totalStretchZ;
      });
      
      // Debug: Log active stretch effects with thefog tracking and lighting
      if (system.frameCount % 60 === 0 && system.activeStretchEffects.length > 0) {
        const thefogStretches = system.activeStretchEffects.filter(e => e.isThefog).length;
        const concentratedStretches = system.activeStretchEffects.filter(e => e.concentrated).length;
        const buildingUp = system.activeStretchEffects.filter(e => e.buildupPhase).length;
        const maxDecay = Math.max(...system.activeStretchEffects.map(e => e.buildupPhase ? e.buildup : e.decay)).toFixed(2);
        const lightenedNodes = system.nodes.filter(n => (n.lightening || 0) > 0.1).length;
        const maxLightening = Math.max(...system.nodes.map(n => n.lightening || 0)).toFixed(2);
        console.log('Mesh:', system.activeStretchEffects.length, 'effects (thefog:', thefogStretches, 
                   'concentrated:', concentratedStretches, 'building:', buildingUp, ') strength:', maxDecay, 
                   'lit nodes:', lightenedNodes, 'max light:', maxLightening);
      }
    } else {
      // No active stretch effects - clear stretch offsets and lighting
      system.nodes.forEach(node => {
        node.stretchX = 0;
        node.stretchY = 0;
        node.stretchZ = 0;
        node.lightening = 0;
      });
    }
    
    // Apply constraint forces
    constraints.forEach(constraint => {
      const nodeA = nodes[constraint.nodeA];
      const nodeB = nodes[constraint.nodeB];
      
      const dx = nodeB.x - nodeA.x;
      const dy = nodeB.y - nodeA.y;
      const dz = nodeB.z - nodeA.z;
      const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
      
      if (distance > 0) {
        const difference = (constraint.restLength - distance) / distance;
        const force = difference * CONSTRAINT_CONFIG.springStrength;
        
        const offsetX = dx * force * 0.5;
        const offsetY = dy * force * 0.5;
        const offsetZ = dz * force * 0.5;
        
        nodeA.vx -= offsetX;
        nodeA.vy -= offsetY;
        nodeA.vz -= offsetZ;
        
        nodeB.vx += offsetX;
        nodeB.vy += offsetY;
        nodeB.vz += offsetZ;
      }
    });
    
    // Update node positions
    nodes.forEach((node, i) => {
      if (!node.fixed) {
        // Apply constraint ratio (pulls back to original position)
        if (CONSTRAINT_CONFIG.constraintRatio > 0) {
          const pullX = (node.ox - node.x) * CONSTRAINT_CONFIG.constraintRatio * 0.05;
          const pullY = (node.oy - node.y) * CONSTRAINT_CONFIG.constraintRatio * 0.05;
          const pullZ = (node.oz - node.z) * CONSTRAINT_CONFIG.constraintRatio * 0.05;
          
          node.vx += pullX;
          node.vy += pullY;
          node.vz += pullZ;
        }
        
        // Add very slight upward force to counteract any drift (instead of downward gravity)
        node.vy += 0.0002;
        
        // Update position
        node.x += node.vx;
        node.y += node.vy;
        node.z += node.vz;
        
        // Apply damping
        node.vx *= CONSTRAINT_CONFIG.damping;
        node.vy *= CONSTRAINT_CONFIG.damping;
        node.vz *= CONSTRAINT_CONFIG.damping;
        
        // Add boundaries to prevent excessive drift
        const maxDrift = 5.0;
        if (Math.abs(node.x) > maxDrift || Math.abs(node.y) > maxDrift || Math.abs(node.z) > maxDrift) {
          // Strong pull back toward center if drifting too far
          node.vx += (0 - node.x) * 0.01;
          node.vy += (0 - node.y) * 0.01;
          node.vz += (0 - node.z) * 0.01;
        }
        
        // Update visual node position and appearance
        if (system.nodeInstances[i]) {
          // Apply stretch offset to visual position
          const visualX = node.x + (node.stretchX || 0);
          const visualY = node.y + (node.stretchY || 0);
          const visualZ = node.z + (node.stretchZ || 0);
          system.nodeInstances[i].position.set(visualX, visualY, visualZ);
          
          // Apply lightening effect during stretching
          if (CONSTRAINT_CONFIG.stretchLighting && node.lightening > 0) {
            const baseOpacity = CONSTRAINT_CONFIG.nodeOpacity;
            const lightenedOpacity = Math.max(baseOpacity * (1.0 - node.lightening), 0.1); // Don't go completely transparent
            system.nodeInstances[i].material.opacity = lightenedOpacity;
            
            // Add stronger glow effect for stretched nodes
            if (node.lightening > 0.2) {
              system.nodeInstances[i].material.emissive.setHex(0x4422ff); // Brighter purple glow
              system.nodeInstances[i].material.emissiveIntensity = node.lightening * 0.8; // Stronger intensity
            } else {
              system.nodeInstances[i].material.emissive.setHex(0x000000);
              system.nodeInstances[i].material.emissiveIntensity = 0;
            }
            
            // Force material update
            system.nodeInstances[i].material.needsUpdate = true;
          } else {
            // Reset to normal appearance
            system.nodeInstances[i].material.opacity = CONSTRAINT_CONFIG.nodeOpacity;
            system.nodeInstances[i].material.emissive.setHex(0x000000);
            system.nodeInstances[i].material.emissiveIntensity = 0;
            system.nodeInstances[i].material.needsUpdate = true;
          }
        }
      }
    });
    
    // Update constraint lines
    if (system.constraintLines) {
      const linePositions = system.constraintLines.geometry.attributes.position.array;
      constraints.forEach((constraint, i) => {
        const nodeA = nodes[constraint.nodeA];
        const nodeB = nodes[constraint.nodeB];
        const i6 = i * 6;
        
        // Apply stretch offsets to constraint line endpoints
        linePositions[i6] = nodeA.x + (nodeA.stretchX || 0);
        linePositions[i6 + 1] = nodeA.y + (nodeA.stretchY || 0);
        linePositions[i6 + 2] = nodeA.z + (nodeA.stretchZ || 0);
        linePositions[i6 + 3] = nodeB.x + (nodeB.stretchX || 0);
        linePositions[i6 + 4] = nodeB.y + (nodeB.stretchY || 0);
        linePositions[i6 + 5] = nodeB.z + (nodeB.stretchZ || 0);
      });
      system.constraintLines.geometry.attributes.position.needsUpdate = true;
    }
  }
  
  // Animate spider web waves
  if (window._webRings) {
    window._webRings.forEach(ring => {
      const userData = ring.userData;
      const positions = ring.geometry.attributes.position.array;
      const originalPos = userData.originalPositions;
      
      // Multiple wave parameters for organic motion
      const waveSpeed1 = elapsed * 0.8;
      const waveSpeed2 = elapsed * 1.2;
      const waveSpeed3 = elapsed * 0.6;
      
      // Wave amplitude decreases toward center (inner rings have smaller waves)
      const waveAmp = 0.15 * (userData.radius / 12); // Scale by distance from center
      
      for (let i = 0; i <= userData.segmentCount; i++) {
        const i3 = i * 3;
        const angle = (i / userData.segmentCount) * Math.PI * 2;
        
        // Combine multiple sine waves for natural water-like motion
        const wave1 = Math.sin(waveSpeed1 + angle * 3) * waveAmp;
        const wave2 = Math.sin(waveSpeed2 + angle * 2 + userData.ringIndex * 0.5) * (waveAmp * 0.6);
        const wave3 = Math.cos(waveSpeed3 + angle * 4 + userData.radius * 0.1) * (waveAmp * 0.4);
        
        // Apply wave height to Y coordinate
        positions[i3] = originalPos[i3];     // X unchanged
        positions[i3 + 1] = wave1 + wave2 + wave3; // Y with waves
        positions[i3 + 2] = originalPos[i3 + 2];   // Z unchanged
      }
      
      ring.geometry.attributes.position.needsUpdate = true;
    });
  }
  
  // Update camera controls
  if (window.cameraControls) {
    window.cameraControls.update();
  }
  
  renderer.render(scene, camera);
}

// Event handlers
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Mouse interaction for agent details
window.addEventListener('click', (event) => {
  const mouse = new THREE.Vector2();
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObjects(clickableObjects);
  
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData && obj.userData.agent) {
      showAgentDetails(obj.userData.agent);
    } else if (obj.userData && obj.userData.type === 'hub') {
      showHubDetails(obj.userData.hubInfo);
    }
  } else {
    hideDetailPanel();
  }
});

// Mouse movement tracking for constraint system
window.addEventListener('mousemove', (event) => {
  // Debug: Simple test that mouse events are firing (throttled)
  if (window._constraintSystem && window._constraintSystem.frameCount % 120 === 0) {
    console.log('Mouse event fired - system exists:', !!window._constraintSystem, 'enabled:', !!window._constraintSystem.mouseInteractionEnabled);
  }
  
  if (window._constraintSystem && CONSTRAINT_CONFIG.followMouse && window._constraintSystem.mouseInteractionEnabled) {
    const system = window._constraintSystem;
    
    // Convert mouse coordinates to normalized device coordinates
    system.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    system.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    // Raycast from camera through mouse position - use window.camera to ensure scope
    if (window.camera) {
      system.raycaster.setFromCamera(system.mouse, window.camera);
      
      // Create invisible plane at center for mouse intersection
      const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
      const intersectPoint = new THREE.Vector3();
      
      if (system.raycaster.ray.intersectPlane(plane, intersectPoint)) {
        system.mousePosition.copy(intersectPoint);
        // Offset to constraint group position
        system.mousePosition.add(system.group.position);
        // Debug: Log every 60 frames (1 second) to avoid spam
        if (system.frameCount && system.frameCount % 60 === 0) {
          console.log('Mouse black hole position:', system.mousePosition.x.toFixed(2), system.mousePosition.y.toFixed(2), system.mousePosition.z.toFixed(2));
        }
      } else if (system.frameCount && system.frameCount % 120 === 0) {
        console.log('Mouse raycast not intersecting plane');
      }
    } else if (system.frameCount && system.frameCount % 120 === 0) {
      console.log('No camera available for mouse tracking');
    }
  } else if (window._constraintSystem && system.frameCount % 120 === 0) {
    // Debug why mouse isn't being tracked
    console.log('Mouse not tracked - followMouse:', CONSTRAINT_CONFIG.followMouse, 'enabled:', window._constraintSystem.mouseInteractionEnabled);
  }
});

function showAgentDetails(agent) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  
  document.getElementById('detail-agent-name').textContent = agent.name || agent.id;
  document.getElementById('detail-agent-hub').textContent = `Hub: ${agent.hub}`;
  document.getElementById('detail-messages').textContent = Math.floor(Math.random() * 999);
  document.getElementById('detail-uptime').textContent = '99%';
  
  const capsDiv = document.getElementById('detail-capabilities');
  capsDiv.innerHTML = agent.capabilities ? 
    agent.capabilities.map(cap => `<span style="color: #00e5ff; font-size: 10px;">${cap}</span>`).join(', ') :
    '<span style="color: #666;">No capabilities listed</span>';
}

function showHubDetails(hubInfo) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  
  // Use the same detail panel but populate with hub information
  document.getElementById('detail-agent-name').textContent = `${hubInfo.name.toUpperCase()} HUB`;
  document.getElementById('detail-agent-hub').textContent = `Type: Federation Hub`;
  
  // Show hub position instead of random messages
  const pos = hubInfo.center;
  document.getElementById('detail-messages').textContent = `${pos.x}, ${pos.y}, ${pos.z}`;
  
  // Show hub status
  document.getElementById('detail-uptime').textContent = 'ACTIVE';
  
  // Show hub description as capabilities
  const capsDiv = document.getElementById('detail-capabilities');
  capsDiv.innerHTML = `<span style="color: ${hubInfo.color}; font-size: 11px; line-height: 1.4;">${hubInfo.description}</span>`;
}

function hideDetailPanel() {
  document.getElementById('detail-panel').classList.remove('visible');
}

// Initialize
init();

</script>
