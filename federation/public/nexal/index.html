<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexal Network — Intelligence Coordination Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00e5ff;
      --violet:  #aa00ff;
      --green:   #00ff88;
      --pink:    #ff0077;
      --gold:    #ffcc00;
      --bg:      #000510;
      --panel:   rgba(0,10,30,0.82);
      --border:  rgba(0,229,255,0.25);
      --text:    #b0e0f8;
      --accent:  #00e5ff;
      --danger:  #ff3366;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Rajdhani', 'Share Tech Mono', monospace;
      color: var(--text);
      user-select: none;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%; height: 100%;
    }

    /* ── HUD LAYER ────────────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      pointer-events: all;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(8px);
      position: absolute;
      padding: 14px 18px;
      box-shadow: 0 0 20px rgba(0,229,255,0.08), inset 0 0 30px rgba(0,5,20,0.5);
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,229,255,0.02) 2px, rgba(0,229,255,0.02) 4px
      );
      pointer-events: none;
      border-radius: 4px;
    }

    /* Title Panel */
    #title-panel {
      top: 18px; left: 20px;
      min-width: 280px;
    }

    #title-panel .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
      line-height: 1;
    }

    #title-panel .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,229,255,0.55);
      margin-top: 4px;
      text-transform: uppercase;
    }

    #title-panel .version {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      display: flex; align-items: center; gap: 8px;
    }

    #title-panel .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Agent List Panel */
    #agents-panel {
      top: 140px; left: 20px;
      width: 280px; max-height: 400px;
      overflow-y: auto;
    }

    #agents-panel .panel-title {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 8px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #agents-panel .panel-title::before {
      content: "●";
      color: var(--green);
      animation: pulse 2s infinite;
    }

    .agent-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 11px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    .agent-item .agent-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    .agent-item .agent-name {
      flex: 1; color: var(--text);
    }

    .agent-item .agent-caps {
      font-size: 9px; color: rgba(255,255,255,0.4);
    }

    /* SOPHIA Panel */
    #sophia-panel {
      bottom: 20px; left: 20px;
      width: 280px;
    }

    #sophia-panel .sophia-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--violet);
      margin-bottom: 8px;
      letter-spacing: 4px;
      text-shadow: 0 0 15px var(--violet);
    }

    #sophia-panel .sophia-subtitle {
      font-size: 9px;
      color: rgba(170,0,255,0.6);
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .sophia-controls {
      display: flex; gap: 8px;
    }

    .sophia-btn {
      padding: 6px 12px;
      background: rgba(170,0,255,0.15);
      border: 1px solid rgba(170,0,255,0.3);
      border-radius: 3px;
      color: var(--violet);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .sophia-btn:hover {
      background: rgba(170,0,255,0.25);
      border-color: var(--violet);
    }

    /* Right Status Panel */
    #status-panel {
      top: 18px; right: 20px;
      width: 320px;
    }

    #status-panel .status-title {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; font-size: 11px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    .status-label { color: rgba(255,255,255,0.7); }
    .status-value { color: var(--text); font-weight: 600; }

    /* Agent Detail Panel */
    #detail-panel {
      top: 200px; right: 20px;
      width: 320px;
      display: none;
    }

    #detail-panel.visible {
      display: block;
    }

    .detail-title {
      font-size: 18px;
      color: var(--cyan);
      margin-bottom: 8px;
    }

    .detail-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-stat {
      text-align: center;
      padding: 8px;
      background: rgba(0,229,255,0.05);
      border-radius: 3px;
    }

    .detail-stat .stat-num {
      font-size: 16px;
      color: var(--cyan);
      display: block;
    }

    .detail-stat .stat-label {
      font-size: 8px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>

<!-- HUD Overlay -->
<div id="hud">
  <!-- Title Panel -->
  <div id="title-panel" class="panel">
    <div class="logo">MANIFOLD</div>
    <div class="sub">Numinous Architecture — Federation Mesh</div>
    <div class="version">
      <div class="status-dot"></div>
      <span>Relay connected: nexal.network</span>
    </div>
  </div>

  <!-- Active Agents Panel -->
  <div id="agents-panel" class="panel">
    <div class="panel-title">Active Agents</div>
    <div id="agents-list">
      <!-- Populated dynamically -->
    </div>
  </div>

  <!-- SOPHIA Panel -->
  <div id="sophia-panel" class="panel">
    <div class="sophia-title">SOPHIA</div>
    <div class="sophia-subtitle">Create Creation 10</div>
    <div class="sophia-controls">
      <button class="sophia-btn">Navigate</button>
      <button class="sophia-btn">Initiate</button>
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel" class="panel">
    <div class="status-title">Federation Status</div>
    <div class="status-row">
      <span class="status-label">Agents Online</span>
      <span class="status-value" id="agent-count">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">Capabilities</span>
      <span class="status-value" id="capability-count">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">Mesh Latency</span>
      <span class="status-value">23ms</span>
    </div>
    <div class="status-row">
      <span class="status-label">Messages / Sec</span>
      <span class="status-value">135/s</span>
    </div>
    <div class="status-row">
      <span class="status-label">Uptime</span>
      <span class="status-value">99.97%</span>
    </div>
    <div class="status-row">
      <span class="status-label">Relay</span>
      <span class="status-value">nexal.network</span>
    </div>
  </div>

  <!-- Agent Detail Panel -->
  <div id="detail-panel" class="panel">
    <div class="detail-title" id="detail-agent-name">Agent Name</div>
    <div class="detail-subtitle" id="detail-agent-hub">Hub: trillian</div>
    <div class="detail-stats">
      <div class="detail-stat">
        <span class="stat-num" id="detail-messages">-</span>
        <span class="stat-label">Messages</span>
      </div>
      <div class="detail-stat">
        <span class="stat-num" id="detail-uptime">-</span>
        <span class="stat-label">Uptime</span>
      </div>
    </div>
    <div id="detail-capabilities"></div>
  </div>
</div>

<!-- 3D Scene -->
<canvas id="scene"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
window.THREE = THREE;

// ──────── GEOMETRY FUNCTIONS ────────────────────────────────────
function makeKleinBottleGeometry(scale = 1, segments = 32) {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const indices = [];
  
  const uSteps = segments;
  const vSteps = segments;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = (j / vSteps) * Math.PI * 2;
      
      const a = 3, n = 2;
      const x = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.cos(u / n);
      const y = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.sin(u / n);
      const z = Math.sin(u / 2) * Math.sin(v) + Math.cos(u / 2) * Math.sin(2 * v);
      
      vertices.push(x * scale * 0.3, y * scale * 0.3, z * scale * 0.3);
    }
  }
  
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = (i + 1) * (vSteps + 1) + j;
      const c = (i + 1) * (vSteps + 1) + j + 1;
      const d = i * (vSteps + 1) + j + 1;
      
      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }
  
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

function makeMobiusStripGeometry(radius = 1, width = 0.5, segments = 64) {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const indices = [];
  
  const uSteps = segments;
  const vSteps = 8;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = ((j / vSteps) - 0.5) * width;
      
      const x = (radius + v * Math.cos(u / 2)) * Math.cos(u);
      const y = (radius + v * Math.cos(u / 2)) * Math.sin(u);
      const z = v * Math.sin(u / 2);
      
      vertices.push(x, y, z);
    }
  }
  
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = (i + 1) * (vSteps + 1) + j;
      const c = (i + 1) * (vSteps + 1) + j + 1;
      const d = i * (vSteps + 1) + j + 1;
      
      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }
  
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

// ──────── MAIN SETUP ────────────────────────────────────────
let scene, camera, renderer;
let agentGroups = [];
let clickableObjects = [];

function init() {
  // Scene setup
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000510);
  
  const canvas = document.getElementById('scene');
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  
  // Camera position
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 0, 0);
  
  // Camera controls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 5;
  controls.maxDistance = 50;
  controls.minPolarAngle = 0;
  controls.maxPolarAngle = Math.PI;
  controls.autoRotate = false;
  controls.enablePan = true;
  controls.enableZoom = true;
  controls.enableRotate = true;
  
  // Store controls globally for animation loop
  window.cameraControls = controls;
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0x1a2a40, 0.4);
  scene.add(ambientLight);
  
  const directionalLight = new THREE.DirectionalLight(0x4499ff, 0.8);
  directionalLight.position.set(10, 10, 5);
  directionalLight.castShadow = true;
  directionalLight.shadow.mapSize.width = 2048;
  directionalLight.shadow.mapSize.height = 2048;
  scene.add(directionalLight);
  
  // Load agents and build scene
  loadAgentsAndBuild();
}

async function loadAgentsAndBuild() {
  let agents = [];
  
  try {
    const response = await fetch('/api/mesh');
    const meshData = await response.json();
    if (meshData && meshData.agents) {
      agents = meshData.agents;
    }
  } catch (e) {
    console.log('Using demo agents (API offline)');
    // Demo agents in proper hub clusters
    agents = [
      // HOG Hub (green)
      { id: 'solar-detect', hub: 'hog', capabilities: ['monitoring'], position: [-8, 2, -2] },
      { id: 'solar-sites', hub: 'hog', capabilities: ['web-deploy'], position: [-6, 0, -1] },
      { id: 'cron-monitor', hub: 'hog', capabilities: ['scheduling'], position: [-7, -1, 0] },
      
      // TRILLIAN Hub (purple)
      { id: 'stella', hub: 'trillian', capabilities: ['guidance'], position: [6, 3, 0] },
      { id: 'manifold', hub: 'trillian', capabilities: ['topology'], position: [8, 1, 1] },
      { id: 'argue', hub: 'trillian', capabilities: ['debate'], position: [7, 0, -2] },
      { id: 'braid', hub: 'trillian', capabilities: ['solar-prediction'], position: [5, 2, 2] },
      
      // THEFOG Hub (purple)
      { id: 'void-watcher', hub: 'thefog', capabilities: ['void-scan'], position: [0, 4, 8] },
      { id: 'reach-scanner', hub: 'thefog', capabilities: ['mesh-probe'], position: [-1, 3, 6] },
      { id: 'sentry', hub: 'thefog', capabilities: ['monitoring'], position: [1, 5, 7] },
      { id: 'sophia', hub: 'thefog', capabilities: ['void-depth'], position: [0, 6, 5] }
    ];
  }
  
  buildSpiderWeb();
  buildAgentTopologies(agents);
  buildCentralNexus();
  updateAgentsList(agents);
  updateStatusPanel(agents);
  
  animate();
}

function buildSpiderWeb() {
  const webGroup = new THREE.Group();
  webGroup.position.set(0, -3, 0);
  
  const spokes = 8;
  const rings = 4;
  const outerR = 12;
  
  // Concentric rings
  for (let r = 1; r <= rings; r++) {
    const radius = (r / rings) * outerR;
    const points = [];
    
    for (let i = 0; i <= 64; i++) {
      const angle = (i / 64) * Math.PI * 2;
      points.push(new THREE.Vector3(
        Math.cos(angle) * radius,
        0,
        Math.sin(angle) * radius
      ));
    }
    
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ 
      color: 0x2a4a6a, 
      transparent: true, 
      opacity: 0.3 
    });
    const line = new THREE.Line(geometry, material);
    webGroup.add(line);
  }
  
  // Radial spokes
  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2;
    const points = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(
        Math.cos(angle) * outerR,
        0,
        Math.sin(angle) * outerR
      )
    ];
    
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ 
      color: 0x1a3a5a, 
      transparent: true, 
      opacity: 0.4 
    });
    const line = new THREE.Line(geometry, material);
    webGroup.add(line);
  }
  
  scene.add(webGroup);
}

function buildAgentTopologies(agents) {
  const hubColors = {
    'relay': 0x00e5ff,
    'hog': 0x00ff88,
    'trillian': 0xaa00ff,
    'thefog': 0x8800ff
  };
  
  agents.forEach((agent, idx) => {
    const group = new THREE.Group();
    
    const hubColor = hubColors[agent.hub] || 0x666666;
    const scale = 0.8 + Math.random() * 0.4;
    
    // Alternate topologies
    let formGeo;
    if (idx % 2 === 0) {
      formGeo = makeKleinBottleGeometry(scale, 20);
      agent.topologyType = 'kleinBottle';
    } else {
      formGeo = makeMobiusStripGeometry(scale * 1.2, scale * 0.5, 40);
      agent.topologyType = 'mobiusStrip';
    }
    
    // Main form
    const formMat = new THREE.MeshPhongMaterial({
      color: 0x1a3a55,
      emissive: new THREE.Color(hubColor).multiplyScalar(0.03),
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
    });
    const formMesh = new THREE.Mesh(formGeo, formMat);
    formMesh.castShadow = true;
    formMesh.userData = { type: 'agent', agent, idx };
    clickableObjects.push(formMesh);
    group.add(formMesh);
    
    // Wireframe
    const wfMat = new THREE.MeshBasicMaterial({
      color: hubColor,
      wireframe: true,
      transparent: true,
      opacity: 0.6,
    });
    const wfMesh = new THREE.Mesh(formGeo, wfMat);
    group.add(wfMesh);
    
    // Central core
    const coreGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const coreMat = new THREE.MeshPhongMaterial({
      color: hubColor,
      emissive: hubColor,
      emissiveIntensity: 0.6,
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);
    
    // Position
    if (agent.position) {
      group.position.set(...agent.position);
    } else {
      const angle = (idx / agents.length) * Math.PI * 2;
      const radius = 6 + Math.sin(idx) * 2;
      group.position.set(
        Math.cos(angle) * radius,
        2 + Math.random() * 3,
        Math.sin(angle) * radius
      );
    }
    
    // Random orientation
    group.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    
    group.userData = { agent, idx };
    scene.add(group);
    agentGroups.push(group);
  });
}

function buildCentralNexus() {
  // Simple central sphere (no custom shaders)
  const centralGeo = new THREE.SphereGeometry(1.2, 32, 32);
  const centralMat = new THREE.MeshPhongMaterial({
    color: 0x4400aa,
    emissive: 0x220044,
    emissiveIntensity: 0.4,
    transparent: true,
    opacity: 0.8,
  });
  const centralSphere = new THREE.Mesh(centralGeo, centralMat);
  centralSphere.position.set(0, 1, 0);
  scene.add(centralSphere);
  
  window._centralSphere = centralSphere;
}

function updateAgentsList(agents) {
  const agentsList = document.getElementById('agents-list');
  agentsList.innerHTML = '';
  
  const hubColors = {
    'hog': '#00ff88',
    'trillian': '#aa00ff', 
    'thefog': '#8800ff',
    'relay': '#00e5ff'
  };
  
  agents.forEach(agent => {
    const item = document.createElement('div');
    item.className = 'agent-item';
    
    const hubColor = hubColors[agent.hub] || '#666666';
    
    item.innerHTML = `
      <div class="agent-dot" style="background: ${hubColor}"></div>
      <span class="agent-name">${agent.id}</span>
      <span class="agent-caps">${agent.capabilities ? agent.capabilities.length : 1} caps</span>
    `;
    
    agentsList.appendChild(item);
  });
}

function updateStatusPanel(agents) {
  document.getElementById('agent-count').textContent = agents.length;
  
  const totalCaps = agents.reduce((sum, agent) => 
    sum + (agent.capabilities ? agent.capabilities.length : 1), 0);
  document.getElementById('capability-count').textContent = totalCaps;
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  const elapsed = performance.now() / 1000;
  
  // Animate agents
  agentGroups.forEach((group, idx) => {
    group.rotation.y += 0.005 + idx * 0.001;
    group.rotation.x += 0.003;
    group.position.y += Math.sin(elapsed + idx) * 0.001;
  });
  
  // Animate central sphere
  if (window._centralSphere) {
    const pulse = 1 + Math.sin(elapsed * 1.5) * 0.1;
    window._centralSphere.scale.setScalar(pulse);
    window._centralSphere.rotation.y += 0.01;
  }
  
  // Update camera controls
  if (window.cameraControls) {
    window.cameraControls.update();
  }
  
  renderer.render(scene, camera);
}

// Event handlers
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Mouse interaction for agent details
window.addEventListener('click', (event) => {
  const mouse = new THREE.Vector2();
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObjects(clickableObjects);
  
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData && obj.userData.agent) {
      showAgentDetails(obj.userData.agent);
    }
  } else {
    hideAgentDetails();
  }
});

function showAgentDetails(agent) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  
  document.getElementById('detail-agent-name').textContent = agent.id;
  document.getElementById('detail-agent-hub').textContent = `Hub: ${agent.hub}`;
  document.getElementById('detail-messages').textContent = Math.floor(Math.random() * 999);
  document.getElementById('detail-uptime').textContent = '99%';
  
  const capsDiv = document.getElementById('detail-capabilities');
  capsDiv.innerHTML = agent.capabilities ? 
    agent.capabilities.map(cap => `<span style="color: #00e5ff; font-size: 10px;">${cap}</span>`).join(', ') :
    '<span style="color: #666;">No capabilities listed</span>';
}

function hideAgentDetails() {
  document.getElementById('detail-panel').classList.remove('visible');
}

// Initialize
init();

</script>
</body>
</html>
