<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manifold — Federation Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a10;
      --surface: #0c1118;
      --surface2: #111820;
      --border: #1a2535;
      --text: #c8d6e5;
      --text-dim: #5a7089;
      --cyan: #00d4ff;
      --green: #00e676;
      --violet: #b388ff;
      --orange: #ff9100;
      --pink: #ff4081;
      --red: #ff3d3d;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--cyan);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .workshop-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--violet);
      color: var(--violet);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .workshop-btn:hover {
      background: rgba(179, 136, 255, 0.1);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .status-dot.offline { background: var(--red); animation: none; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      background: var(--surface);
      padding: 16px 20px;
      text-align: center;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 600;
      color: var(--cyan);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Main Grid ── */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      min-height: calc(100vh - 130px);
    }

    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg);
      padding: 20px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .panel-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.08);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── Hub Cards ── */
    .hub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .hub-card:hover { border-color: var(--cyan); }

    .hub-name {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hub-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .hub-agents {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .agent-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      cursor: default;
      transition: all 0.15s;
    }
    .agent-tag.local {
      border-color: rgba(0, 230, 118, 0.3);
      color: var(--green);
    }
    .agent-tag:hover {
      border-color: var(--cyan);
      transform: translateY(-1px);
    }

    /* ── Peer List ── */
    .peer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .peer-name { font-weight: 600; }

    .peer-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-dim);
      font-size: 11px;
    }

    .peer-status {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
    }
    .peer-status.stale { background: var(--orange); }

    /* ── Dark Circles ── */
    .pressure-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .pressure-bar:last-child { border-bottom: none; }

    .pressure-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pressure-track {
      width: 80px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .pressure-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .pressure-val {
      width: 32px;
      text-align: right;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Events Feed ── */
    .event-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .event-item:last-child { border-bottom: none; }
    .event-time { color: var(--text-dim); font-size: 11px; }
    .event-text { color: var(--text); margin-top: 2px; }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* ── Full width panels ── */
    .panel.full { grid-column: 1 / -1; }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div>
      <div class="logo">MANIFOLD</div>
      <div class="logo-sub">Federation Dashboard</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="status-badge">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">connecting...</span>
    </div>
    <a href="/nexal/meshlet" class="workshop-btn">⚡ WORKSHOP</a>
  </div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat">
    <div class="stat-value" id="stat-agents">—</div>
    <div class="stat-label">Agents</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-hubs">—</div>
    <div class="stat-label">Hubs</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-caps">—</div>
    <div class="stat-label">Capabilities</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-peers">—</div>
    <div class="stat-label">Peers</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-circles">—</div>
    <div class="stat-label">Dark Circles</div>
  </div>
</div>

<div class="dashboard">
  <!-- Hubs & Agents -->
  <div class="panel" id="hubs-panel">
    <div class="panel-header">
      <div class="panel-title">Hubs & Agents</div>
      <div class="panel-count" id="agent-count"></div>
    </div>
    <div id="hubs-list"><div class="loading">Loading...</div></div>
  </div>

  <!-- Peer Connections -->
  <div class="panel" id="peers-panel">
    <div class="panel-header">
      <div class="panel-title">Peer Connections</div>
      <div class="panel-count" id="peer-count"></div>
    </div>
    <div id="peers-list"><div class="loading">Loading...</div></div>
  </div>

  <!-- Dark Circles (full width) -->
  <div class="panel full" id="circles-panel">
    <div class="panel-header">
      <div class="panel-title">Dark Circles — Capability Pressure</div>
      <div class="panel-count" id="circle-count"></div>
    </div>
    <div id="circles-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
const HUB_COLORS = {
  trillian: '#b388ff',
  hog: '#00e676',
  thefog: '#7c4dff',
  bobiverse: '#ff9100',
  relay: '#00d4ff',
};

let meshData = null;

async function fetchMesh() {
  try {
    const res = await fetch('/mesh');
    meshData = await res.json();
    render(meshData);
    const dot = document.getElementById('status-dot');
    dot.classList.remove('offline');
    document.getElementById('status-text').textContent = 'mesh live';
  } catch (e) {
    document.getElementById('status-dot').classList.add('offline');
    document.getElementById('status-text').textContent = 'offline';
  }
}

function render(data) {
  if (!data) return;

  const { agents = [], peers = [], darkCircles = [], stats = {}, capabilities = [] } = data;

  // Stats
  document.getElementById('stat-agents').textContent = agents.length;
  document.getElementById('stat-hubs').textContent = (stats.hubs || []).length;
  document.getElementById('stat-caps').textContent = capabilities.length;
  document.getElementById('stat-peers').textContent = peers.length;
  document.getElementById('stat-circles').textContent = darkCircles.length;

  // Group agents by hub
  const byHub = {};
  agents.forEach(a => {
    if (!byHub[a.hub]) byHub[a.hub] = [];
    byHub[a.hub].push(a);
  });

  // Hubs & Agents
  const hubsHtml = Object.entries(byHub).map(([hub, hubAgents]) => {
    const color = HUB_COLORS[hub] || '#888';
    const tags = hubAgents.map(a =>
      `<span class="agent-tag ${a.isLocal ? 'local' : ''}" title="${(a.capabilities || []).join(', ')}">${a.name}</span>`
    ).join('');
    return `
      <div class="hub-card">
        <div class="hub-name">
          <span class="hub-dot" style="background:${color}"></span>
          <span style="color:${color}">${hub}</span>
          <span style="color:var(--text-dim);font-weight:300;font-size:11px">${hubAgents.length} agent${hubAgents.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="hub-agents">${tags}</div>
      </div>
    `;
  }).join('');
  document.getElementById('hubs-list').innerHTML = hubsHtml || '<div class="loading">No agents</div>';
  document.getElementById('agent-count').textContent = agents.length + ' agents';

  // Peers — deduplicate by hub
  const seenHubs = new Set();
  const uniquePeers = peers.filter(p => {
    if (seenHubs.has(p.hub)) return false;
    seenHubs.add(p.hub);
    return true;
  });

  const peersHtml = uniquePeers.map(p => {
    const lastSeen = new Date(p.lastSeen);
    const ago = timeAgo(lastSeen);
    const stale = (Date.now() - lastSeen.getTime()) > 300000;
    const color = HUB_COLORS[p.hub] || '#888';
    return `
      <div class="peer-row">
        <span class="peer-name" style="color:${color}">
          <span class="peer-status ${stale ? 'stale' : ''}"></span>
          ${p.hub}
        </span>
        <div class="peer-meta">
          <span>${p.agentCount} agents</span>
          <span>${ago}</span>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('peers-list').innerHTML = peersHtml || '<div class="loading">No peers</div>';
  document.getElementById('peer-count').textContent = uniquePeers.length + ' peers';

  // Dark Circles — sort by pressure descending, show top 15
  const sorted = [...darkCircles].sort((a, b) => b.pressure - a.pressure).slice(0, 15);
  const circlesHtml = sorted.map(dc => {
    const pct = Math.min(100, Math.round(dc.pressure * 100));
    const color = dc.pressure > 0.7 ? '#ff3d3d' : dc.pressure > 0.3 ? '#ff9100' : '#00d4ff';
    const hubs = Object.entries(dc.byHub || {}).map(([h, v]) => `${h}: ${v.toFixed(2)}`).join('  ');
    return `
      <div class="pressure-bar" title="${hubs}">
        <span class="pressure-name">${dc.name}</span>
        <div class="pressure-track">
          <div class="pressure-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <span class="pressure-val">${pct}%</span>
      </div>
    `;
  }).join('');
  document.getElementById('circles-list').innerHTML = circlesHtml || '<div class="loading">No data</div>';
  document.getElementById('circle-count').textContent = darkCircles.length + ' circles';
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

// Initial load + polling
fetchMesh();
setInterval(fetchMesh, 5000);
</script>

</body>
</html>
