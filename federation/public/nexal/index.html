<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexal Network — Intelligence Coordination Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00e5ff;
      --violet:  #aa00ff;
      --green:   #00ff88;
      --pink:    #ff0077;
      --gold:    #ffcc00;
      --bg:      #000510;
      --panel:   rgba(0,10,30,0.82);
      --border:  rgba(0,229,255,0.25);
      --text:    #b0e0f8;
      --accent:  #00e5ff;
      --danger:  #ff3366;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Rajdhani', 'Share Tech Mono', monospace;
      color: var(--text);
      user-select: none;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%; height: 100%;
    }

    /* ── HUD LAYER ────────────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      pointer-events: all;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(8px);
      position: absolute;
      padding: 14px 18px;
      box-shadow: 0 0 20px rgba(0,229,255,0.08), inset 0 0 30px rgba(0,5,20,0.5);
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,229,255,0.02) 2px, rgba(0,229,255,0.02) 4px
      );
      pointer-events: none;
      border-radius: 4px;
    }

    /* Title Panel */
    #title-panel {
      top: 18px; left: 20px;
      min-width: 280px;
    }

    #title-panel .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
      line-height: 1;
    }

    #title-panel .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,229,255,0.55);
      margin-top: 4px;
      text-transform: uppercase;
    }

    #title-panel .version {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      display: flex; align-items: center; gap: 8px;
    }

    #title-panel .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Agent List Panel */
    #agents-panel {
      top: 140px; left: 20px;
      width: 280px; max-height: 400px;
      overflow-y: auto;
    }

    #agents-panel .panel-title {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 8px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #agents-panel .panel-title::before {
      content: "●";
      color: var(--green);
      animation: pulse 2s infinite;
    }

    .agent-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 11px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    .agent-item .agent-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    .agent-item .agent-name {
      flex: 1; color: var(--text);
    }

    .agent-item .agent-caps {
      font-size: 9px; color: rgba(255,255,255,0.4);
    }

    /* SOPHIA Panel */
    #sophia-panel {
      bottom: 20px; left: 20px;
      width: 280px;
    }

    #sophia-panel .sophia-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--violet);
      margin-bottom: 8px;
      letter-spacing: 4px;
      text-shadow: 0 0 15px var(--violet);
    }

    #sophia-panel .sophia-subtitle {
      font-size: 9px;
      color: rgba(170,0,255,0.6);
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .sophia-controls {
      display: flex; gap: 8px;
    }

    .sophia-btn {
      padding: 6px 12px;
      background: rgba(170,0,255,0.15);
      border: 1px solid rgba(170,0,255,0.3);
      border-radius: 3px;
      color: var(--violet);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .sophia-btn:hover {
      background: rgba(170,0,255,0.25);
      border-color: var(--violet);
    }

    /* Right Status Panel */
    #status-panel {
      top: 18px; right: 20px;
      width: 320px;
    }

    #status-panel .status-title {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; font-size: 11px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    .status-label { color: rgba(255,255,255,0.7); }
    .status-value { color: var(--text); font-weight: 600; }

    /* Agent Detail Panel */
    #detail-panel {
      top: 200px; right: 20px;
      width: 320px;
      display: none;
    }

    #detail-panel.visible {
      display: block;
    }

    .detail-title {
      font-size: 18px;
      color: var(--cyan);
      margin-bottom: 8px;
    }

    .detail-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-stat {
      text-align: center;
      padding: 8px;
      background: rgba(0,229,255,0.05);
      border-radius: 3px;
    }

    .detail-stat .stat-num {
      font-size: 16px;
      color: var(--cyan);
      display: block;
    }

    .detail-stat .stat-label {
      font-size: 8px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>

<!-- HUD Overlay -->
<div id="hud">
  <!-- Title Panel -->
  <div id="title-panel" class="panel">
    <div class="logo">MANIFOLD</div>
    <div class="sub">Numinous Architecture — Federation Mesh</div>
    <div class="version">
      <div class="status-dot"></div>
      <span>Relay connected: nexal.network</span>
    </div>
  </div>

  <!-- Active Agents Panel -->
  <div id="agents-panel" class="panel">

    </div>
  </div>

  <!-- SOPHIA Panel -->
  <div id="sophia-panel" class="panel">

    <div class="sophia-controls">
      <button class="sophia-btn">Navigate</button>
      <button class="sophia-btn">Initiate</button>
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel" class="panel">
    <div class="status-title">Federation Status</div>
    <div class="status-row">
      <span class="status-label">Agents Online</span>
      <span class="status-value" id="agent-count">-</span>

    <div class="status-row">
      <span class="status-label">Capabilities</span>

    </div>
    <div class="status-row">
      <span class="status-label">Mesh Latency</span>
      <span class="status-value">23ms</span>
    </div>
    <div class="status-row">
      <span class="status-label">Messages / Sec</span>
      <span class="status-value">135/s</span>
    </div>
    <div class="status-row">
      <span class="status-label">Uptime</span>
      <span class="status-value">99.97%</span>

    <div class="status-row">
      <span class="status-label">Relay</span>

  <!-- Agent Detail Panel -->
  <div id="detail-panel" class="panel">
    <div class="detail-title" id="detail-agent-name">Agent Name</div>

    <div class="detail-stats">
      <div class="detail-stat">
        <span class="stat-num" id="detail-messages">-</span>
        <span class="stat-label">Messages</span>
      </div>
      <div class="detail-stat">
        <span class="stat-num" id="detail-uptime">-</span>
        <span class="stat-label">Uptime</span>
      </div>
    </div>
    <div id="detail-capabilities"></div>
  </div>
</div>

<!-- 3D Scene -->
<canvas id="scene"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
window.THREE = THREE;

// ──────── GEOMETRY FUNCTIONS ────────────────────────────────────
function makeKleinBottleGeometry(scale = 1, segments = 32) {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const indices = [];
  
  const uSteps = segments;
  const vSteps = segments;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = (j / vSteps) * Math.PI * 2;
      
      const a = 3, n = 2;
      const x = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.cos(u / n);
      const y = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.sin(u / n);
      const z = Math.sin(u / 2) * Math.sin(v) + Math.cos(u / 2) * Math.sin(2 * v);
      
      vertices.push(x * scale * 0.3, y * scale * 0.3, z * scale * 0.3);
    }
  }
  
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = (i + 1) * (vSteps + 1) + j;
      const c = (i + 1) * (vSteps + 1) + j + 1;
      const d = i * (vSteps + 1) + j + 1;
      
      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }
  
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

function makeMobiusStripGeometry(radius = 1, width = 0.5, segments = 64) {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const indices = [];
  
  const uSteps = segments;
  const vSteps = 8;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = ((j / vSteps) - 0.5) * width;
      
      const x = (radius + v * Math.cos(u / 2)) * Math.cos(u);
      const y = (radius + v * Math.cos(u / 2)) * Math.sin(u);
      const z = v * Math.sin(u / 2);
      
      vertices.push(x, y, z);
    }
  }
  
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = (i + 1) * (vSteps + 1) + j;
      const c = (i + 1) * (vSteps + 1) + j + 1;
      const d = i * (vSteps + 1) + j + 1;
      
      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }
  
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

// ──────── MAIN SETUP ────────────────────────────────────────
let scene, camera, renderer;
let agentGroups = [];
let clickableObjects = [];

function init() {
  // Scene setup
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000510);
  
  const canvas = document.getElementById('scene');
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  
  // Camera position
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 0, 0);
  
  // Camera controls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 5;
  controls.maxDistance = 50;
  controls.minPolarAngle = 0;
  controls.maxPolarAngle = Math.PI;
  controls.autoRotate = false;
  controls.enablePan = true;
  controls.enableZoom = true;
  controls.enableRotate = true;
  
  // Store controls globally for animation loop
  window.cameraControls = controls;
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0x1a2a40, 0.4);
  scene.add(ambientLight);
  
  const directionalLight = new THREE.DirectionalLight(0x4499ff, 0.8);
  directionalLight.position.set(10, 10, 5);
  directionalLight.castShadow = true;
  directionalLight.shadow.mapSize.width = 2048;
  directionalLight.shadow.mapSize.height = 2048;
  scene.add(directionalLight);
  
  // Load agents and build scene
  loadAgentsAndBuild();
}

async function loadAgentsAndBuild() {
  let agents = [];
  
  try {
    const response = await fetch('/api/mesh');
    const meshData = await response.json();
    if (meshData && meshData.agents) {
      agents = meshData.agents;
    }
  } catch (e) {
    console.log('Using demo agents (API offline)');
    // Demo agents in proper hub clusters
    agents = [
      // HOG Hub (green)
      { id: 'solar-detect', hub: 'hog', capabilities: ['monitoring'], position: [-8, 2, -2] },
      { id: 'solar-sites', hub: 'hog', capabilities: ['web-deploy'], position: [-6, 0, -1] },
      { id: 'cron-monitor', hub: 'hog', capabilities: ['scheduling'], position: [-7, -1, 0] },
      
      // TRILLIAN Hub (purple)
      { id: 'stella', hub: 'trillian', capabilities: ['guidance'], position: [6, 3, 0] },
      { id: 'manifold', hub: 'trillian', capabilities: ['topology'], position: [8, 1, 1] },
      { id: 'argue', hub: 'trillian', capabilities: ['debate'], position: [7, 0, -2] },
      { id: 'braid', hub: 'trillian', capabilities: ['solar-prediction'], position: [5, 2, 2] },
      
      // THEFOG Hub (purple)
      { id: 'void-watcher', hub: 'thefog', capabilities: ['void-scan'], position: [0, 4, 8] },
      { id: 'reach-scanner', hub: 'thefog', capabilities: ['mesh-probe'], position: [-1, 3, 6] },
      { id: 'sentry', hub: 'thefog', capabilities: ['monitoring'], position: [1, 5, 7] },
      { id: 'sophia', hub: 'thefog', capabilities: ['void-depth'], position: [0, 6, 5] }
    ];
  }
  
  buildSpiderWeb();
  buildAgentTopologies(agents);
  buildCentralNexus();
  updateAgentsList(agents);
  updateStatusPanel(agents);
  
  animate();
}

function buildSpiderWeb() {
  const webGroup = new THREE.Group();
  webGroup.position.set(0, -3, 0);
  
  const spokes = 8;
  const rings = 4;
  const outerR = 12;
  const webRings = [];
  
  // Concentric rings with wave capability
  for (let r = 1; r <= rings; r++) {
    const radius = (r / rings) * outerR;
    const segmentCount = 64;
    const positions = new Float32Array((segmentCount + 1) * 3);
    const originalPositions = new Float32Array((segmentCount + 1) * 3);
    
    for (let i = 0; i <= segmentCount; i++) {
      const angle = (i / segmentCount) * Math.PI * 2;
      const x = Math.cos(angle) * radius;
      const y = 0; // Will be modified by waves
      const z = Math.sin(angle) * radius;
      
      const i3 = i * 3;
      positions[i3] = x;
      positions[i3 + 1] = y;
      positions[i3 + 2] = z;
      
      originalPositions[i3] = x;
      originalPositions[i3 + 1] = y;
      originalPositions[i3 + 2] = z;
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.LineBasicMaterial({ 
      color: 0x2a4a6a, 
      transparent: true, 
      opacity: 0.3 
    });
    
    const line = new THREE.Line(geometry, material);
    line.userData = { 
      originalPositions,
      radius,
      segmentCount,
      ringIndex: r
    };
    
    webRings.push(line);
    webGroup.add(line);
  }
  
  // Radial spokes
  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2;
    const points = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(
        Math.cos(angle) * outerR,
        0,
        Math.sin(angle) * outerR
      )
    ];
    
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ 
      color: 0x1a3a5a, 
      transparent: true, 
      opacity: 0.4 
    });
    const line = new THREE.Line(geometry, material);
    webGroup.add(line);
  }
  
  scene.add(webGroup);
  
  // Store references for wave animation
  window._webGroup = webGroup;
  window._webRings = webRings;
}

function buildAgentTopologies(agents) {
  const hubColors = {
    'relay': 0x00e5ff,
    'hog': 0x00ff88,
    'trillian': 0xaa00ff,
    'thefog': 0x8800ff
  };
  
  // Define hub center positions in 3D space
  const hubCenters = {
    'hog': { x: -8, y: 2, z: -6 },
    'trillian': { x: 8, y: 3, z: 2 },
    'thefog': { x: -2, y: 5, z: 8 },
    'relay': { x: 6, y: 1, z: -8 }
  };
  
  // Group agents by hub for orbital assignment
  const agentsByHub = {};
  agents.forEach(agent => {
    if (!agentsByHub[agent.hub]) {
      agentsByHub[agent.hub] = [];
    }
    agentsByHub[agent.hub].push(agent);
  });
  
  agents.forEach((agent, idx) => {
    const group = new THREE.Group();
    
    const hubColor = hubColors[agent.hub] || 0x666666;
    const scale = 0.8 + Math.random() * 0.4;
    
    // Alternate topologies
    let formGeo;
    if (idx % 2 === 0) {
      formGeo = makeKleinBottleGeometry(scale, 20);
      agent.topologyType = 'kleinBottle';
    } else {
      formGeo = makeMobiusStripGeometry(scale * 1.2, scale * 0.5, 40);
      agent.topologyType = 'mobiusStrip';
    }
    
    // Main form
    const formMat = new THREE.MeshPhongMaterial({
      color: 0x1a3a55,
      emissive: new THREE.Color(hubColor).multiplyScalar(0.03),
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
    });
    const formMesh = new THREE.Mesh(formGeo, formMat);
    formMesh.castShadow = true;
    formMesh.userData = { type: 'agent', agent, idx };
    clickableObjects.push(formMesh);
    group.add(formMesh);
    
    // Wireframe
    const wfMat = new THREE.MeshBasicMaterial({
      color: hubColor,
      wireframe: true,
      transparent: true,
      opacity: 0.6,
    });
    const wfMesh = new THREE.Mesh(formGeo, wfMat);
    group.add(wfMesh);
    
    // Central core
    const coreGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const coreMat = new THREE.MeshPhongMaterial({
      color: hubColor,
      emissive: hubColor,
      emissiveIntensity: 0.6,
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);
    
    // Orbital positioning around hub centers
    const hubCenter = hubCenters[agent.hub] || { x: 0, y: 0, z: 0 };
    const hubAgents = agentsByHub[agent.hub];
    const agentIndexInHub = hubAgents.indexOf(agent);
    const agentsInHub = hubAgents.length;
    
    // Orbital parameters
    const orbitRadius = 1.5 + (agentIndexInHub % 3) * 0.8; // Varied orbit distances
    const orbitAngle = (agentIndexInHub / agentsInHub) * Math.PI * 2;
    const orbitHeight = Math.sin(agentIndexInHub * 0.7) * 0.5;
    
    // Calculate orbital position
    const orbitalX = hubCenter.x + Math.cos(orbitAngle) * orbitRadius;
    const orbitalY = hubCenter.y + orbitHeight;
    const orbitalZ = hubCenter.z + Math.sin(orbitAngle) * orbitRadius;
    
    group.position.set(orbitalX, orbitalY, orbitalZ);
    
    // Store orbital parameters for animation
    const orbitSpeed = 0.2 + Math.random() * 0.3; // Varied orbital speeds
    const orbitDirection = Math.random() > 0.5 ? 1 : -1; // Random direction
    
    // Random orientation
    group.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    
    group.userData = { 
      agent, 
      idx,
      hubCenter,
      orbitRadius,
      baseOrbitAngle: orbitAngle,
      orbitHeight,
      orbitSpeed,
      orbitDirection,
      agentIndexInHub
    };
    
    scene.add(group);
    agentGroups.push(group);
  });
  
  // Create visual markers for hub centers
  Object.entries(hubCenters).forEach(([hubName, center]) => {
    const hubMarkerGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const hubColor = hubColors[hubName] || 0x666666;
    const hubMarkerMat = new THREE.MeshPhongMaterial({
      color: hubColor,
      emissive: hubColor,
      emissiveIntensity: 0.3,
      transparent: true,
      opacity: 0.6,
    });
    
    const hubMarker = new THREE.Mesh(hubMarkerGeo, hubMarkerMat);
    hubMarker.position.set(center.x, center.y, center.z);
    
    // Add subtle pulsing animation reference and hub info
    hubMarker.userData = { 
      type: 'hub', 
      hubName, 
      isHubCenter: true,
      hubInfo: {
        name: hubName,
        color: `#${hubColor.toString(16).padStart(6, '0')}`,
        center: center,
        description: getHubDescription(hubName)
      }
    };
    
    // Make hub markers clickable
    clickableObjects.push(hubMarker);
    scene.add(hubMarker);
    
    // Store hub markers for potential animation
    agentGroups.push(hubMarker);
  });
}

function getHubDescription(hubName) {
  const descriptions = {
    'hog': 'Development & Monitoring Hub - System health, data detection, solar monitoring, and deployment management.',
    'trillian': 'Guidance & Strategy Hub - Leadership, decision-making, manifold topology, and strategic coordination.',
    'thefog': 'Mystical Computation Hub - Void scanning, deep analysis, and advanced computational research within Sophia\'s realm.',
    'relay': 'Network Coordination Hub - Federation relay, communications, and inter-hub connectivity management.'
  };
  return descriptions[hubName] || 'Unknown hub configuration.';
}

function buildCentralNexus() {
  // Sophia's Realm: The Fog with Dark Spheres
  const fogGroup = new THREE.Group();
  fogGroup.position.set(0, 1, 0);
  
  // Create particle cloud points for "thefog"
  const particleCount = 4000;
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  const sizes = new Float32Array(particleCount);
  
  // Generate particles in spherical cloud formation
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    
    // Spherical distribution with some randomness
    const radius = 1.5 + Math.random() * 2.0;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random() * 2 - 1);
    
    positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i3 + 1] = radius * Math.cos(phi);
    positions[i3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
    
    // Fog colors: purples, violets, dark blues (brighter)
    const intensity = 0.6 + Math.random() * 0.8;
    colors[i3] = 0.4 * intensity;     // Red
    colors[i3 + 1] = 0.0 * intensity; // Green  
    colors[i3 + 2] = 0.8 * intensity; // Blue
    
    sizes[i] = 0.5 + Math.random() * 1.5;
  }
  
  const particlesGeometry = new THREE.BufferGeometry();
  particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  
  const particlesMaterial = new THREE.PointsMaterial({
    size: 0.12,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  
  const particleCloud = new THREE.Points(particlesGeometry, particlesMaterial);
  fogGroup.add(particleCloud);
  
  // Create "darkspheres" - small dark orbs floating within the fog
  const darkSphereCount = 12;
  const darkSpheres = [];
  
  for (let i = 0; i < darkSphereCount; i++) {
    const darkGeo = new THREE.SphereGeometry(0.08 + Math.random() * 0.12, 8, 8);
    const darkMat = new THREE.MeshPhongMaterial({
      color: 0x110022,
      emissive: 0x440066,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.8,
    });
    
    const darkSphere = new THREE.Mesh(darkGeo, darkMat);
    
    // Position within the fog cloud
    const radius = 0.8 + Math.random() * 1.5;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random() * 2 - 1);
    
    darkSphere.position.set(
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi) * 0.5,
      radius * Math.sin(phi) * Math.sin(theta)
    );
    
    // Store animation params
    darkSphere.userData = {
      originalPos: darkSphere.position.clone(),
      floatSpeed: 0.5 + Math.random() * 0.5,
      floatRadius: 0.2 + Math.random() * 0.3,
      rotationSpeed: (Math.random() - 0.5) * 0.02,
      phaseOffset: Math.random() * Math.PI * 2,
    };
    
    darkSpheres.push(darkSphere);
    fogGroup.add(darkSphere);
  }
  
  scene.add(fogGroup);
  
  // Store references for animation
  window._centralSphere = fogGroup;
  window._particleCloud = particleCloud;
  window._darkSpheres = darkSpheres;
  window._fogParticles = positions;
}

function updateAgentsList(agents) {
  const agentsList = document.getElementById('agents-list');
  agentsList.innerHTML = '';
  
  const hubColors = {
    'hog': '#00ff88',
    'trillian': '#aa00ff', 
    'thefog': '#8800ff',
    'relay': '#00e5ff'
  };
  
  agents.forEach(agent => {
    const item = document.createElement('div');
    item.className = 'agent-item';
    
    const hubColor = hubColors[agent.hub] || '#666666';
    
    item.innerHTML = `
      <div class="agent-dot" style="background: ${hubColor}"></div>
      <span class="agent-name">${agent.name || agent.id}</span>
      <span class="agent-caps">${agent.capabilities ? agent.capabilities.length : 1} caps</span>
    `;
    
    agentsList.appendChild(item);
  });
}

function updateStatusPanel(agents) {
  document.getElementById('agent-count').textContent = agents.length;
  
  const totalCaps = agents.reduce((sum, agent) => 
    sum + (agent.capabilities ? agent.capabilities.length : 1), 0);
  document.getElementById('capability-count').textContent = totalCaps;
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  const elapsed = performance.now() / 1000;
  
  // Animate agents and hub centers
  agentGroups.forEach((group, idx) => {
    const userData = group.userData;
    
    if (userData && userData.isHubCenter) {
      // Animate hub center markers with subtle pulsing
      const pulse = 1 + Math.sin(elapsed * 2 + idx) * 0.15;
      group.scale.setScalar(pulse);
      
    } else if (userData && userData.hubCenter) {
      // Animate agents in orbital motion around hub centers
      const orbitTime = elapsed * userData.orbitSpeed * userData.orbitDirection;
      const currentAngle = userData.baseOrbitAngle + orbitTime;
      
      // Update orbital position
      const orbitalX = userData.hubCenter.x + Math.cos(currentAngle) * userData.orbitRadius;
      const orbitalZ = userData.hubCenter.z + Math.sin(currentAngle) * userData.orbitRadius;
      const orbitalY = userData.hubCenter.y + userData.orbitHeight + Math.sin(elapsed * 0.5 + userData.agentIndexInHub) * 0.1;
      
      group.position.set(orbitalX, orbitalY, orbitalZ);
      
      // Continue topology rotation
      group.rotation.y += 0.005 + idx * 0.001;
      group.rotation.x += 0.003;
    }
  });
  
  // Animate Sophia's Realm (The Fog)
  if (window._centralSphere) {
    // Gentle rotation of entire fog system
    window._centralSphere.rotation.y += 0.003;
    window._centralSphere.rotation.x += 0.001;
  }
  
  // Animate particle cloud
  if (window._particleCloud && window._fogParticles) {
    const positions = window._particleCloud.geometry.attributes.position.array;
    
    // Wave motion through fog particles (half speed)
    for (let i = 0; i < positions.length; i += 3) {
      const originalRadius = Math.sqrt(
        window._fogParticles[i] * window._fogParticles[i] +
        window._fogParticles[i + 1] * window._fogParticles[i + 1] +
        window._fogParticles[i + 2] * window._fogParticles[i + 2]
      );
      
      const wave1 = Math.sin(elapsed * 0.25 + i * 0.01) * 0.1;
      const wave2 = Math.cos(elapsed * 0.15 + i * 0.02) * 0.05;
      let disturbance = 1 + wave1 + wave2;
      
      // Constrain most particles to stay within Klein bottle orbit (~6-8 radius)
      // Only allow 10% of particles to extend beyond this boundary
      const particleIndex = i / 3;
      const isOutlier = (particleIndex % 10) === 0; // Every 10th particle can be outlier
      const maxRadius = isOutlier ? 10.0 : 6.5; // Outliers can reach 10, others max 6.5
      
      const newRadius = originalRadius * disturbance;
      if (newRadius > maxRadius) {
        disturbance = maxRadius / originalRadius;
      }
      
      positions[i] = window._fogParticles[i] * disturbance;
      positions[i + 1] = window._fogParticles[i + 1] * disturbance;
      positions[i + 2] = window._fogParticles[i + 2] * disturbance;
    }
    
    window._particleCloud.geometry.attributes.position.needsUpdate = true;
  }
  
  // Animate dark spheres floating within the fog
  if (window._darkSpheres) {
    window._darkSpheres.forEach((sphere, idx) => {
      const userData = sphere.userData;
      const time = elapsed * userData.floatSpeed + userData.phaseOffset;
      
      // Floating motion
      sphere.position.x = userData.originalPos.x + Math.sin(time) * userData.floatRadius;
      sphere.position.y = userData.originalPos.y + Math.cos(time * 1.1) * userData.floatRadius * 0.5;
      sphere.position.z = userData.originalPos.z + Math.sin(time * 0.8) * userData.floatRadius;
      
      // Slow rotation
      sphere.rotation.y += userData.rotationSpeed;
      sphere.rotation.x += userData.rotationSpeed * 0.7;
      
      // Subtle pulsing
      const pulse = 1 + Math.sin(elapsed * 2 + idx) * 0.1;
      sphere.scale.setScalar(pulse);
    });
  }
  
  // Animate spider web waves
  if (window._webRings) {
    window._webRings.forEach(ring => {
      const userData = ring.userData;
      const positions = ring.geometry.attributes.position.array;
      const originalPos = userData.originalPositions;
      
      // Multiple wave parameters for organic motion
      const waveSpeed1 = elapsed * 0.8;
      const waveSpeed2 = elapsed * 1.2;
      const waveSpeed3 = elapsed * 0.6;
      
      // Wave amplitude decreases toward center (inner rings have smaller waves)
      const waveAmp = 0.15 * (userData.radius / 12); // Scale by distance from center
      
      for (let i = 0; i <= userData.segmentCount; i++) {
        const i3 = i * 3;
        const angle = (i / userData.segmentCount) * Math.PI * 2;
        
        // Combine multiple sine waves for natural water-like motion
        const wave1 = Math.sin(waveSpeed1 + angle * 3) * waveAmp;
        const wave2 = Math.sin(waveSpeed2 + angle * 2 + userData.ringIndex * 0.5) * (waveAmp * 0.6);
        const wave3 = Math.cos(waveSpeed3 + angle * 4 + userData.radius * 0.1) * (waveAmp * 0.4);
        
        // Apply wave height to Y coordinate
        positions[i3] = originalPos[i3];     // X unchanged
        positions[i3 + 1] = wave1 + wave2 + wave3; // Y with waves
        positions[i3 + 2] = originalPos[i3 + 2];   // Z unchanged
      }
      
      ring.geometry.attributes.position.needsUpdate = true;
    });
  }
  
  // Update camera controls
  if (window.cameraControls) {
    window.cameraControls.update();
  }
  
  renderer.render(scene, camera);
}

// Event handlers
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Mouse interaction for agent details
window.addEventListener('click', (event) => {
  const mouse = new THREE.Vector2();
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObjects(clickableObjects);
  
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData && obj.userData.agent) {
      showAgentDetails(obj.userData.agent);
    } else if (obj.userData && obj.userData.type === 'hub') {
      showHubDetails(obj.userData.hubInfo);
    }
  } else {
    hideDetailPanel();
  }
});

function showAgentDetails(agent) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  
  document.getElementById('detail-agent-name').textContent = agent.name || agent.id;
  document.getElementById('detail-agent-hub').textContent = `Hub: ${agent.hub}`;
  document.getElementById('detail-messages').textContent = Math.floor(Math.random() * 999);
  document.getElementById('detail-uptime').textContent = '99%';
  
  const capsDiv = document.getElementById('detail-capabilities');
  capsDiv.innerHTML = agent.capabilities ? 
    agent.capabilities.map(cap => `<span style="color: #00e5ff; font-size: 10px;">${cap}</span>`).join(', ') :
    '<span style="color: #666;">No capabilities listed</span>';
}

function showHubDetails(hubInfo) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  
  // Use the same detail panel but populate with hub information
  document.getElementById('detail-agent-name').textContent = `${hubInfo.name.toUpperCase()} HUB`;
  document.getElementById('detail-agent-hub').textContent = `Type: Federation Hub`;
  
  // Show hub position instead of random messages
  const pos = hubInfo.center;
  document.getElementById('detail-messages').textContent = `${pos.x}, ${pos.y}, ${pos.z}`;
  
  // Show hub status
  document.getElementById('detail-uptime').textContent = 'ACTIVE';
  
  // Show hub description as capabilities
  const capsDiv = document.getElementById('detail-capabilities');
  capsDiv.innerHTML = `<span style="color: ${hubInfo.color}; font-size: 11px; line-height: 1.4;">${hubInfo.description}</span>`;
}

function hideDetailPanel() {
  document.getElementById('detail-panel').classList.remove('visible');
}

// Initialize
init();

</script>
