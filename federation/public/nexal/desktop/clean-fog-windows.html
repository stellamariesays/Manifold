<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexal Network — Intelligence Coordination Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00e5ff;
      --violet:  #aa00ff;
      --green:   #00ff88;
      --pink:    #ff0077;
      --gold:    #ffcc00;
      --bg:      #000510;
      --panel:   rgba(0,10,30,0.85);
      --border:  rgba(0,229,255,0.25);
      --text:    #b0e0f8;
      --accent:  #00e5ff;
      --danger:  #ff3366;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Rajdhani', 'Share Tech Mono', monospace;
      color: var(--text);
      user-select: none;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* ── WINDOWS OVERLAY ─────────────────────────────── */
    #windows-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Toolbar */
    #toolbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(16, 34, 64, 0.9);
      border: 2px solid var(--border);
      border-radius: 6px;
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: all;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .toolbar-title {
      font-weight: 700;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .toolbar-button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: all;
    }

    .toolbar-button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Taskbar */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(180deg, rgba(0, 10, 30, 0.95) 0%, rgba(0, 5, 15, 0.95) 100%);
      border-top: 2px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      pointer-events: all;
    }

    .taskbar-button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      padding: 8px 16px;
      margin-right: 8px;
      font-size: 11px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .taskbar-button:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--accent);
    }

    /* Loading Screen */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #loading.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-title {
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 16px;
      text-shadow: 0 0 30px var(--cyan);
    }

    .loader-sub {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
    }

    .loader-bar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--violet));
      width: 0%;
      animation: loadingFill 3s ease-in-out infinite;
    }

    @keyframes loadingFill {
      0%, 100% { width: 0%; }
      50% { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="loader-title">NEXAL</div>
  <div class="loader-sub">Initializing Fog Animation</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- WebGL Canvas -->
<canvas id="scene"></canvas>

<!-- Windows Overlay -->
<div id="windows-overlay">
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-title">NEXAL NETWORK</div>
    <button class="toolbar-button" onclick="alert('Fog Animation: Active')">Status</button>
    <button class="toolbar-button" onclick="alert('Command Center')">Command</button>
    <button class="toolbar-button" onclick="resetView()">Reset View</button>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button class="taskbar-button">Federation Status</button>
    <div style="flex: 1;"></div>
    <div style="font-size: 11px; color: rgba(255,255,255,0.7);">
      Nexal Network v2.1 | Fog Animation: Active ✓
    </div>
  </div>
</div>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script>
'use strict';

// ── Scene Globals ──────────────────────────────────────────────
let scene, camera, renderer, clock;
let sophiaGroup;

// Camera orbit state
const orbit = { theta: 0.5, phi: 1.1, radius: 26.4, target: new THREE.Vector3(0, 2, 0) };

// ── Init ───────────────────────────────────────────────────────
function init() {
  const canvas = document.getElementById('scene');

  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000510);
  scene.fog = new THREE.FogExp2(0x000510, 0.018);

  // Camera
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  updateCamera();

  clock = new THREE.Clock();

  // Build scene
  buildLights();
  buildStars();
  buildGrid();
  buildSophiaCore();

  // Interaction
  initInteraction();

  // Hide loader after 3 seconds
  setTimeout(() => {
    const loader = document.getElementById('loading');
    if (loader) {
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 900);
    }
  }, 3000);

  // Resize
  window.addEventListener('resize', onResize);

  // Start loop
  animate();
}

// ── Camera ─────────────────────────────────────────────────────
function updateCamera() {
  const { theta, phi, radius, target } = orbit;
  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.sin(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(target);
}

function resetView() {
  orbit.theta = 0.5;
  orbit.phi = 1.1;
  orbit.radius = 26.4;
  updateCamera();
}

// ── Lights ─────────────────────────────────────────────────────
function buildLights() {
  // Ambient
  scene.add(new THREE.AmbientLight(0x112233, 0.8));

  // Main directional
  const dir = new THREE.DirectionalLight(0x4488bb, 0.6);
  dir.position.set(10, 20, 10);
  dir.castShadow = true;
  scene.add(dir);

  // Sophia glow light
  const sophiaLight = new THREE.PointLight(0xaa00ff, 3.5, 18);
  sophiaLight.position.set(0, 1.5, 0);
  scene.add(sophiaLight);
  window._sophiaLight = sophiaLight;
}

// ── Stars ──────────────────────────────────────────────────────
function buildStars() {
  const count = 3000;
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const r = 120 + Math.random() * 80;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);

    const t = Math.random();
    col[i*3]   = 0.7 + t * 0.3;
    col[i*3+1] = 0.7 + t * 0.1;
    col[i*3+2] = 0.8 + Math.random() * 0.2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.25,
    vertexColors: true,
    transparent: true,
    opacity: 0.85,
    sizeAttenuation: true,
  });

  scene.add(new THREE.Points(geo, mat));
}

// ── Grid ────────────────────────────────────────────────
function buildGrid() {
  const gridMat = new THREE.LineBasicMaterial({
    color: 0x003366,
    transparent: true,
    opacity: 0.25,
  });

  const size = 40, step = 2;
  const points = [];
  for (let i = -size; i <= size; i += step) {
    points.push(new THREE.Vector3(-size, -7, i), new THREE.Vector3(size, -7, i));
    points.push(new THREE.Vector3(i, -7, -size), new THREE.Vector3(i, -7, size));
  }

  const gridGeo = new THREE.BufferGeometry().setFromPoints(points);
  scene.add(new THREE.LineSegments(gridGeo, gridMat));
}

// ── Sophia Fog Core (THE MAIN FEATURE) ────────────────────────────────────────────
const fogVertexShader = `
  varying vec3 vPosition;
  varying vec3 vNormal;
  varying vec2 vUv;
  
  void main() {
    vPosition = position;
    vNormal = normal;
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fogFragmentShader = `
  uniform float time;
  uniform vec3 fogColor;
  uniform float opacity;
  uniform float noiseScale;
  varying vec3 vPosition;
  varying vec3 vNormal;
  varying vec2 vUv;
  
  float noise(vec3 p) {
    return sin(p.x * 1.2) * sin(p.y * 1.3) * sin(p.z * 1.1) * 0.5 + 0.5;
  }
  
  float fbm(vec3 p) {
    float value = 0.0;
    float amplitude = 0.5;
    for(int i = 0; i < 4; i++) {
      value += amplitude * noise(p);
      p *= 2.0;
      amplitude *= 0.5;
    }
    return value;
  }
  
  void main() {
    vec3 pos = vPosition + time * 0.1;
    float noise1 = fbm(pos * noiseScale);
    float noise2 = fbm(pos * noiseScale * 1.5 + time * 0.05);
    
    float alpha = noise1 * noise2 * opacity;
    alpha *= smoothstep(0.0, 0.3, length(vPosition) / 4.0);
    
    gl_FragColor = vec4(fogColor, alpha);
  }
`;

function buildSophiaCore() {
  sophiaGroup = new THREE.Group();
  sophiaGroup.position.set(0, 1.0, 0);

  // Create The Fog - volumetric cloud system
  window._fogClouds = [];
  
  // Multiple cloud layers with different scales and densities
  const cloudLayers = [
    { scale: 3.5, color: [0.4, 0.0, 0.8], opacity: 0.12, noiseScale: 0.8, offset: [0, 0, 0] },
    { scale: 4.2, color: [0.2, 0.0, 0.6], opacity: 0.08, noiseScale: 0.6, offset: [0.5, 0.2, -0.3] },
    { scale: 5.0, color: [0.6, 0.0, 1.0], opacity: 0.06, noiseScale: 0.4, offset: [-0.3, -0.1, 0.4] },
    { scale: 3.8, color: [0.3, 0.0, 0.7], opacity: 0.10, noiseScale: 1.0, offset: [0.2, 0.3, 0.1] },
  ];
  
  cloudLayers.forEach((layer, index) => {
    const cloudGeo = new THREE.SphereGeometry(layer.scale, 32, 32);
    
    const cloudMat = new THREE.ShaderMaterial({
      vertexShader: fogVertexShader,
      fragmentShader: fogFragmentShader,
      uniforms: {
        time: { value: 0 },
        fogColor: { value: new THREE.Vector3(...layer.color) },
        opacity: { value: layer.opacity },
        noiseScale: { value: layer.noiseScale }
      },
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    
    const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
    cloudMesh.position.set(...layer.offset);
    cloudMesh.userData = { 
      layer: index,
      rotationSpeed: 0.1 + Math.random() * 0.1,
      driftSpeed: 0.05 + Math.random() * 0.05
    };
    
    sophiaGroup.add(cloudMesh);
    window._fogClouds.push(cloudMesh);
  });

  // Central core hidden within the fog
  const hiddenCoreGeo = new THREE.IcosahedronGeometry(0.8, 2);
  const hiddenCoreMat = new THREE.MeshPhongMaterial({
    color: 0x220044,
    emissive: 0x4400aa,
    emissiveIntensity: 1.2,
    transparent: true,
    opacity: 0.6,
  });
  const hiddenCore = new THREE.Mesh(hiddenCoreGeo, hiddenCoreMat);
  sophiaGroup.add(hiddenCore);
  window._sophiaCore = hiddenCore;

  // Fog wisps
  const wispCount = 12;
  const wispPositions = new Float32Array(wispCount * 3);
  for (let i = 0; i < wispCount; i++) {
    const radius = 2.5 + Math.random() * 1.5;
    const angle = Math.random() * Math.PI * 2;
    const height = (Math.random() - 0.5) * 2;
    wispPositions[i * 3] = Math.cos(angle) * radius;
    wispPositions[i * 3 + 1] = height;
    wispPositions[i * 3 + 2] = Math.sin(angle) * radius;
  }
  
  const wispGeo = new THREE.BufferGeometry();
  wispGeo.setAttribute('position', new THREE.BufferAttribute(wispPositions, 3));
  
  const wispMat = new THREE.PointsMaterial({
    color: 0x8800ff,
    size: 0.08,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  
  const wisps = new THREE.Points(wispGeo, wispMat);
  wisps.userData = { 
    orbitSpeed: 0.2,
    floatSpeed: 0.5,
    count: wispCount
  };
  sophiaGroup.add(wisps);
  window._fogWisps = wisps;

  scene.add(sophiaGroup);
}

// ── Interaction ────────────────────────────────────────────────
function initInteraction() {
  const canvas = document.getElementById('scene');
  let isDragging = false;
  let prevX = 0, prevY = 0;

  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    prevX = e.clientX; 
    prevY = e.clientY;
  });

  window.addEventListener('mouseup', () => { isDragging = false; });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    orbit.theta -= dx * 0.008;
    orbit.phi = Math.max(0.15, Math.min(Math.PI * 0.85, orbit.phi + dy * 0.008));
    prevX = e.clientX; 
    prevY = e.clientY;
    updateCamera();
  });

  canvas.addEventListener('wheel', e => {
    orbit.radius = Math.max(5, Math.min(50, orbit.radius + e.deltaY * 0.04));
    updateCamera();
    e.preventDefault();
  }, { passive: false });
}

// ── Animation Loop (THE FOG MAGIC) ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta() || 0.016;

  // ── The Fog: volumetric cloud animation ──
  if (window._fogClouds) {
    sophiaGroup.rotation.y = elapsed * 0.08; // Slow overall rotation
    
    // Animate each fog cloud layer
    window._fogClouds.forEach((cloud, index) => {
      // Update shader time uniform for noise animation
      cloud.material.uniforms.time.value = elapsed;
      
      // Individual layer rotation and drift
      cloud.rotation.y += cloud.userData.rotationSpeed * delta;
      cloud.rotation.x += cloud.userData.rotationSpeed * delta * 0.5;
      
      // Subtle floating motion
      cloud.position.y += Math.sin(elapsed * cloud.userData.driftSpeed + index) * 0.002;
      cloud.position.x += Math.cos(elapsed * cloud.userData.driftSpeed * 1.2 + index * 1.5) * 0.001;
      cloud.position.z += Math.sin(elapsed * cloud.userData.driftSpeed * 0.8 + index * 2.1) * 0.001;
      
      // Breathing opacity variation
      const basePulse = 1 + Math.sin(elapsed * 0.5 + index * 0.7) * 0.2;
      cloud.material.uniforms.opacity.value = cloud.material.uniforms.opacity.value * 0.95 + 
        (basePulse * (0.06 + index * 0.02)) * 0.05;
    });
    
    // Hidden core pulse within the fog
    if (window._sophiaCore) {
      const pulseFactor = 1 + Math.sin(elapsed * 1.5) * 0.1;
      window._sophiaCore.scale.setScalar(pulseFactor);
      
      // Emissive intensity breathing
      const emissivePulse = 0.8 + Math.sin(elapsed * 2.0) * 0.4;
      window._sophiaCore.material.emissiveIntensity = emissivePulse;
    }
  }

  // Fog wisps floating within the cloud
  if (window._fogWisps) {
    const wisps = window._fogWisps;
    const positions = wisps.geometry.attributes.position.array;
    
    for (let i = 0; i < wisps.userData.count; i++) {
      const idx = i * 3;
      const time = elapsed * wisps.userData.floatSpeed + i * 0.5;
      
      // Gentle orbital motion with vertical floating
      const angle = time * wisps.userData.orbitSpeed;
      const radius = 2.5 + Math.sin(time * 0.3 + i) * 0.5;
      const height = Math.sin(time * 0.7 + i * 1.3) * 1.2;
      
      positions[idx] = Math.cos(angle) * radius;
      positions[idx + 1] = height;
      positions[idx + 2] = Math.sin(angle) * radius;
    }
    
    wisps.geometry.attributes.position.needsUpdate = true;
    
    // Subtle opacity breathing
    const opacityPulse = 0.4 + Math.sin(elapsed * 1.2) * 0.2;
    wisps.material.opacity = opacityPulse;
  }

  // Sophia light pulse
  if (window._sophiaLight) {
    window._sophiaLight.intensity = 3.0 + Math.sin(elapsed * 2.1) * 0.8;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── Boot ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', onResize);
</script>
</body>
</html>
