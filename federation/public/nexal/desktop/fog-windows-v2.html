    :root {

      overflow: hidden;

      color: var(--text);

      flex-direction: column;

      top: 20px;
      left: 50%;

      border: 2px solid var(--border);
      border-radius: 6px;
      backdrop-filter: blur(12px);

      align-items: center;
      gap: 12px;

      font-weight: 700;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 1px;
    }

      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: all;
    }

    .toolbar-button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Simple Taskbar */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(180deg, rgba(0, 10, 30, 0.95) 0%, rgba(0, 5, 15, 0.95) 100%);
      border-top: 2px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      pointer-events: all;
    }

      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      padding: 8px 16px;
      margin-right: 8px;
      font-size: 11px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .taskbar-button:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--accent);
    }

    /* Loading Screen */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;

      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--violet));
      width: 0%;
      animation: loadingFill 3s ease-in-out infinite;
    }

    @keyframes loadingFill {
      0%, 100% { width: 0%; }
      50% { width: 100%; }
    }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════
//  Nexal Network — Intelligence Coordination Protocol  ·  Three.js 0.134
// ═══════════════════════════════════════════════════════════════

const RELAY = 'https://nexal.network';
const COLORS = {
  cyan:   0x00e5ff,
  violet: 0xaa00ff,
  green:  0x00ff88,
  pink:   0xff0077,
  gold:   0xffcc00,
  white:  0xffffff,
  blue:   0x0055ff,
  silver: 0x99bbcc,
};

// ── Scene Globals ──────────────────────────────────────────────
let scene, camera, renderer, clock;
let agentGroups = [], sophiaGroup, webGroup, connectionGroup, particleSystem;
let clickableObjects = [];
let selectedObject = null;
let frameCount = 0, lastFpsTime = 0, currentFps = 0;

// Camera orbit state - zoomed out 20% more for better overview
const orbit = { theta: 0.5, phi: 1.1, radius: 26.4, target: new THREE.Vector3(0, 2, 0) };

// Dynamic agent data - populated from federation mesh API
let agentData = [];

// Hub color mapping
const hubColors = {
  'trillian': 0x00e5ff,  // cyan
  'thefog':   0xaa00ff,  // violet  
  'hog':      0x00ff88,  // green
  'bobiverse': 0xff8800, // orange
  'relay':    0x446688,  // blue-gray
  'default':  0x888888   // gray
};

// Convert real agent data to 3D format
function transformAgentData(meshAgents) {
  const hubCounts = {};
  const result = [];
  
  // Count agents per hub for positioning
  meshAgents.forEach(agent => {
    hubCounts[agent.hub] = (hubCounts[agent.hub] || 0) + 1;
  });
  
  const hubPositions = {};
  let hubIndex = 0;
  
  meshAgents.forEach((agent, idx) => {
    const hub = agent.hub;
    
    // Initialize hub positioning if not done yet
    if (!hubPositions[hub]) {
      const hubAngle = (hubIndex / Object.keys(hubCounts).length) * Math.PI * 2;
      const hubRadius = 12 + Math.sin(hubIndex) * 3; // Much further out in X,Y
      
      // Vary Z plane (height) based on hub index
      let hubHeight;
      if (hubIndex === 0) hubHeight = 10;        // Higher 
      else if (hubIndex === 1) hubHeight = 3;    // Down in Z plane, further out X,Y
      else hubHeight = 5;                        // Down in Z plane
      
      hubPositions[hub] = {
        center: [Math.cos(hubAngle) * hubRadius, hubHeight, Math.sin(hubAngle) * hubRadius],
        count: 0,
        total: hubCounts[hub]
      };
      hubIndex++;
    }
    
    // Position agent around hub center
    const hubPos = hubPositions[hub];
    const agentAngle = (hubPos.count / hubPos.total) * Math.PI * 2;
    const agentRadius = 1.5 + (hubPos.total > 3 ? 1 : 0); // Spread out if many agents
    
    const pos = [
      hubPos.center[0] + Math.cos(agentAngle) * agentRadius,
      hubPos.center[1] + (Math.random() - 0.5) * 2, // Slight Y variation
      hubPos.center[2] + Math.sin(agentAngle) * agentRadius
    ];
    
    hubPos.count++;
    
    result.push({
      id: `${hub.toUpperCase()}-${agent.name.toUpperCase()}`,
      name: agent.name,
      hub: agent.hub,
      color: hubColors[hub] || hubColors.default,
      pos: pos,
      dir: [
        (Math.random() - 0.5) * 0.4, // Random direction
        0.8 + Math.random() * 0.4,   // Mostly upward
        (Math.random() - 0.5) * 0.4
      ],
      load: Math.min(0.95, agent.capabilities.length / 10), // Capability count as load
      sig: `${agent.capabilities.length} caps`,
      capabilities: agent.capabilities || [],
      topologyType: idx % 2 === 0 ? 'kleinBottle' : 'mobiusStrip' // Alternate between topological forms
    });
  });
  
  return result;
}

// ── Init ───────────────────────────────────────────────────────
function init() {
  const canvas = document.getElementById('scene');

  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000510);
  scene.fog = new THREE.FogExp2(0x000510, 0.018);

  // Camera
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  updateCamera();

  clock = new THREE.Clock();

  // Build scene
  buildLights();
  buildStars();
  buildGrid();
  buildAgentTopologies();
  buildSophiaCore();
  buildWebBase();
  buildConnections();
  buildParticles();

  // Interaction
  initInteraction();

  // UI - Load real federation data first, then build scene
  fetchFederationData().then(() => {
    // If no agents loaded, use fallback demo data temporarily
    if (agentData.length === 0) {
      console.log('No agents loaded from API, using demo data');
      agentData = [
        { id: 'DEMO-1', name: 'Loading...', color: 0x666666, pos: [0, 8, 0], dir: [0, 1, 0], load: 0.5, sig: 'demo', capabilities: [], topologyType: 'kleinBottle' }
      ];
      buildAgentTopologies();
    }
    
    // Hide loader after successful data load
    console.log('Data loaded, hiding loader');
    setTimeout(() => {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 900);
      }
    }, 500);
  }).catch(error => {
    console.error('Failed to load federation data:', error);
    // Use demo data and hide loader
    agentData = [
      { id: 'DEMO-1', name: 'Loading...', color: 0x666666, pos: [0, 8, 0], dir: [0, 1, 0], load: 0.5, sig: 'demo', capabilities: [], topologyType: 'kleinBottle' }
    ];
    buildAgentTopologies();
    
    setTimeout(() => {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 900);
      }
    }, 500);
  });
  
  setInterval(fetchFederationData, 15000);

  // Resize
  window.addEventListener('resize', onResize);

  // Start loop
  animate();
}      min-width: 250px;

// Convert real agent data to 3D format
function transformAgentData(meshAgents) {
  const hubCounts = {};
  const result = [];
  
  // Count agents per hub for positioning
  meshAgents.forEach(agent => {
    hubCounts[agent.hub] = (hubCounts[agent.hub] || 0) + 1;
  });
  
  const hubPositions = {};
  let hubIndex = 0;
  
  meshAgents.forEach((agent, idx) => {
    const hub = agent.hub;
    
    // Initialize hub positioning if not done yet
    if (!hubPositions[hub]) {
      const hubAngle = (hubIndex / Object.keys(hubCounts).length) * Math.PI * 2;
      const hubRadius = 12 + Math.sin(hubIndex) * 3; // Much further out in X,Y
      
      // Vary Z plane (height) based on hub index
      let hubHeight;
      if (hubIndex === 0) hubHeight = 10;        // Higher 
      else if (hubIndex === 1) hubHeight = 3;    // Down in Z plane, further out X,Y
      else hubHeight = 5;                        // Down in Z plane
      
      hubPositions[hub] = {
        center: [Math.cos(hubAngle) * hubRadius, hubHeight, Math.sin(hubAngle) * hubRadius],
        count: 0,
        total: hubCounts[hub]
      };
      hubIndex++;
    }
    
    // Position agent around hub center
    const hubPos = hubPositions[hub];
    const agentAngle = (hubPos.count / hubPos.total) * Math.PI * 2;
    const agentRadius = 1.5 + (hubPos.total > 3 ? 1 : 0); // Spread out if many agents
    
    const pos = [
      hubPos.center[0] + Math.cos(agentAngle) * agentRadius,
      hubPos.center[1] + (Math.random() - 0.5) * 2, // Slight Y variation
      hubPos.center[2] + Math.sin(agentAngle) * agentRadius
    ];
    
    hubPos.count++;
    
    result.push({
      id: `${hub.toUpperCase()}-${agent.name.toUpperCase()}`,
      name: agent.name,
      hub: agent.hub,
      color: hubColors[hub] || hubColors.default,
      pos: pos,
      dir: [
        (Math.random() - 0.5) * 0.4, // Random direction
        0.8 + Math.random() * 0.4,   // Mostly upward

      load: Math.min(0.95, agent.capabilities.length / 10), // Capability count as load

      capabilities: agent.capabilities || [],
      topologyType: idx % 2 === 0 ? 'kleinBottle' : 'mobiusStrip' // Alternate between topological forms
    });
  });
  
  return result;
}

// ── Klein Bottle Geometry ──────────────────────────────────────
function makeKleinBottleGeometry(scale = 1.0, segments = 32) {
  const vertices = [];
  const indices = [];
  const uvs = [];
  
  const uSteps = segments;
  const vSteps = segments;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = (j / vSteps) * Math.PI * 2;
      
      // Klein bottle parametric equations (figure-8 Klein bottle)
      const r = 2 + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v);
      const x = r * Math.cos(u);
      const y = Math.sin(u / 2) * Math.sin(v) + Math.cos(u / 2) * Math.sin(2 * v);
      const z = r * Math.sin(u);
      
      vertices.push(x * scale, y * scale, z * scale);
      uvs.push(i / uSteps, j / vSteps);
    }
  }
  
  // Create triangular faces
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = a + vSteps + 1;
      const c = a + 1;
      const d = b + 1;
      
      // Two triangles per quad
      indices.push(a, b, c);
      indices.push(b, d, c);
    }
  }
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

// ── Möbius Strip Geometry ──────────────────────────────────────
function makeMobiusStripGeometry(radius = 1.5, width = 0.8, segments = 64) {
  const vertices = [];
  const indices = [];
  const uvs = [];
  
  const uSteps = segments;
  const vSteps = 16;
  
  for (let i = 0; i <= uSteps; i++) {
    for (let j = 0; j <= vSteps; j++) {
      const u = (i / uSteps) * Math.PI * 2;
      const v = ((j / vSteps) - 0.5) * width;
      
      // Möbius strip parametric equations
      const x = (radius + v * Math.cos(u / 2)) * Math.cos(u);
      const y = v * Math.sin(u / 2);
      const z = (radius + v * Math.cos(u / 2)) * Math.sin(u);
      
      vertices.push(x, y, z);
      uvs.push(i / uSteps, j / vSteps);
    }
  }
  
  // Create triangular faces
  for (let i = 0; i < uSteps; i++) {
    for (let j = 0; j < vSteps; j++) {
      const a = i * (vSteps + 1) + j;
      const b = a + vSteps + 1;
      const c = a + 1;
      const d = b + 1;
      
      // Two triangles per quad
      indices.push(a, b, c);
      indices.push(b, d, c);
    }
  }
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

    formMesh.castShadow = true;
    formMesh.userData = { type: 'agent', agent, idx };

    // === Wireframe overlay ===
    let wfGeo;
    if (agent.topologyType === 'kleinBottle') {
      wfGeo = makeKleinBottleGeometry(scale + 0.1, 16);
    } else {
      wfGeo = makeMobiusStripGeometry(1.5 * scale + 0.1, 0.6 * scale + 0.1, 32);
    }
    
    const wfMat = new THREE.MeshBasicMaterial({
      color,
      wireframe: true,
      transparent: true,
      opacity: 0.35,
    });
    const wfMesh = new THREE.Mesh(wfGeo, wfMat);

    // Energy field rings removed for cleaner topology focus

    // === Central energy core ===
    const coreGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const coreMat = new THREE.MeshPhongMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.8,
      transparent: true,
      opacity: 0.9,
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);

    // === Glow halo ===
    const haloGeo = new THREE.PlaneGeometry(scale * 4, scale * 4);
    const haloMat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.06,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    group.add(halo);

    // Support poles removed for cleaner topology

    // Add main form and wireframe
    group.add(formMesh);
    group.add(wfMesh);

    // === Floating data particles around topology ===
    const particleCount = 8;
    const particlePositions = new Float32Array(particleCount * 3);
    for (let p = 0; p < particleCount; p++) {
      const angle = (p / particleCount) * Math.PI * 2;
      const radius = scale * 2.5;
      particlePositions[p * 3] = Math.cos(angle) * radius;
      particlePositions[p * 3 + 1] = (Math.random() - 0.5) * scale;
      particlePositions[p * 3 + 2] = Math.sin(angle) * radius;
    }
    
    const particleGeo = new THREE.BufferGeometry();
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMat = new THREE.PointsMaterial({
      color,
      size: 0.1,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    particles.userData = { orbitSpeed: 0.5 + Math.random() * 0.5 };
    group.add(particles);
    group.userData.particles = particles;

    // Position + orientation
    group.position.set(...agent.pos);

    // Orient toward direction with random variation
    const dir = new THREE.Vector3(...agent.dir).normalize();
    group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    
    // Add some random rotation for variety
    group.rotateX((Math.random() - 0.5) * 0.4);
    group.rotateY((Math.random() - 0.5) * 0.4);
    group.rotateZ((Math.random() - 0.5) * 0.4);

    group.userData.baseQuat = group.quaternion.clone();
    group.userData.agent = agent;
    group.userData.idx = idx;

    scene.add(group);
    agentGroups.push(group);
  });
}

// ── Sophia Core ────────────────────────────────────────────────
// Volumetric fog shader for The Fog
const fogVertexShader = `
  varying vec3 vPosition;
  varying vec3 vNormal;
  varying vec2 vUv;
  
  void main() {
    vPosition = position;
    vNormal = normal;
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fogFragmentShader = `
  uniform float time;
  uniform vec3 fogColor;
  uniform float opacity;
  uniform float noiseScale;
  varying vec3 vPosition;
  varying vec3 vNormal;
  varying vec2 vUv;
  
  // Simple noise function
  float noise(vec3 p) {
    return sin(p.x * 1.2) * sin(p.y * 1.3) * sin(p.z * 1.1) * 0.5 + 0.5;
  }
  
  float fbm(vec3 p) {
    float value = 0.0;
    float amplitude = 0.5;
    for(int i = 0; i < 4; i++) {
      value += amplitude * noise(p);
      p *= 2.0;
      amplitude *= 0.5;
    }
    return value;
  }
  
  void main() {
    vec3 pos = vPosition + time * 0.1;
    float noise1 = fbm(pos * noiseScale);
    float noise2 = fbm(pos * noiseScale * 1.5 + time * 0.05);
    
    float alpha = noise1 * noise2 * opacity;
    alpha *= smoothstep(0.0, 0.3, length(vPosition) / 4.0);
    
    gl_FragColor = vec4(fogColor, alpha);
  }
`;

function buildSophiaCore() {
  sophiaGroup = new THREE.Group();
  sophiaGroup.position.set(0, 1.0, 0);

  // Create The Fog - volumetric cloud system

    { scale: 3.5, color: [0.4, 0.0, 0.8], opacity: 0.12, noiseScale: 0.8, offset: [0, 0, 0] },
    { scale: 4.2, color: [0.2, 0.0, 0.6], opacity: 0.08, noiseScale: 0.6, offset: [0.5, 0.2, -0.3] },
    { scale: 5.0, color: [0.6, 0.0, 1.0], opacity: 0.06, noiseScale: 0.4, offset: [-0.3, -0.1, 0.4] },
    { scale: 3.8, color: [0.3, 0.0, 0.7], opacity: 0.10, noiseScale: 1.0, offset: [0.2, 0.3, 0.1] },
  ];
  
  cloudLayers.forEach((layer, index) => {
    const cloudGeo = new THREE.SphereGeometry(layer.scale, 32, 32);
    
    const cloudMat = new THREE.ShaderMaterial({
      vertexShader: fogVertexShader,
      fragmentShader: fogFragmentShader,
      uniforms: {
        time: { value: 0 },
        fogColor: { value: new THREE.Vector3(...layer.color) },
        opacity: { value: layer.opacity },
        noiseScale: { value: layer.noiseScale }
      },
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    
    const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
    cloudMesh.position.set(...layer.offset);
    cloudMesh.userData = { 
      layer: index,
      rotationSpeed: 0.1 + Math.random() * 0.1,
      driftSpeed: 0.05 + Math.random() * 0.05
    };
    
    sophiaGroup.add(cloudMesh);
    window._fogClouds.push(cloudMesh);
  });

  // Central core hidden within the fog - numinous and sophia
  const hiddenCoreGeo = new THREE.IcosahedronGeometry(0.8, 2);
  const hiddenCoreMat = new THREE.MeshPhongMaterial({
    color: 0x220044,
    emissive: 0x4400aa,
    emissiveIntensity: 1.2,
    transparent: true,
    opacity: 0.6,
  });
  const hiddenCore = new THREE.Mesh(hiddenCoreGeo, hiddenCoreMat);
  hiddenCore.userData = {
    type: 'thefog',
    title: 'THE FOG',
    desc: 'Numinous realm where sophia and ancient wisdom reside. The deep knowing that emerges from uncertainty.',
    stats: [
      { n: '∞', l: 'DEPTH' },
      { n: 'Unknown', l: 'EXTENT' },
      { n: 'Eternal', l: 'DURATION' },
      { n: 'Void', l: 'CLARITY' },
    ]
  };
  clickableObjects.push(hiddenCore);
  sophiaGroup.add(hiddenCore);
  window._sophiaCore = hiddenCore;

  // Subtle wireframe hints within the fog
  const hintGeo = new THREE.IcosahedronGeometry(2.2, 1);
  const hintMat = new THREE.MeshBasicMaterial({
    color: 0x6600ff,
    wireframe: true,
    transparent: true,
    opacity: 0.08,
  });
  const hintFrame = new THREE.Mesh(hintGeo, hintMat);
  sophiaGroup.add(hintFrame);

  // Wave animation will be integrated into spider web structure
  window._sophiaRings = []; // Remove separate wave fields

  // Fog wisps - subtle particle effects within the cloud
  const wispCount = 12;
  const wispPositions = new Float32Array(wispCount * 3);
  for (let i = 0; i < wispCount; i++) {
    const radius = 2.5 + Math.random() * 1.5;
    const angle = Math.random() * Math.PI * 2;
    const height = (Math.random() - 0.5) * 2;
    wispPositions[i * 3] = Math.cos(angle) * radius;
    wispPositions[i * 3 + 1] = height;
    wispPositions[i * 3 + 2] = Math.sin(angle) * radius;
  }
  
  const wispGeo = new THREE.BufferGeometry();
  wispGeo.setAttribute('position', new THREE.BufferAttribute(wispPositions, 3));
  
  const wispMat = new THREE.PointsMaterial({
    color: 0x8800ff,
    size: 0.08,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  
  const wisps = new THREE.Points(wispGeo, wispMat);
  wisps.userData = { 
    orbitSpeed: 0.2,
    floatSpeed: 0.5,
    count: wispCount
  };
  sophiaGroup.add(wisps);
  window._fogWisps = wisps;

  scene.add(sophiaGroup);
}

// ── Web / Mesh Base ────────────────────────────────────────────
function buildWebBase() {
  webGroup = new THREE.Group();
  webGroup.position.set(0, -3.5, 0);
  webGroup.rotation.x = -0.12; // Slight tilt toward viewer

  const spokes = 8;
  const rings  = 4;
  const outerR = 7.0;

  // Materials
  const spokeMat = new THREE.LineBasicMaterial({
    color: 0x00ff88,
    transparent: true,
    opacity: 0.5,
  });

  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff,
    transparent: true,
    opacity: 0.35,
  });

  const faceMat = new THREE.MeshBasicMaterial({
    color: 0x003322,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const nodeColor = 0x00ff88;

  // Compute spoke endpoints
  const spokeEnds = [];
  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2;
    spokeEnds.push(new THREE.Vector3(
      Math.cos(angle) * outerR,
      0,
      Math.sin(angle) * outerR
    ));
  }

  // Draw spokes
  spokeEnds.forEach(end => {
    const pts = [new THREE.Vector3(0, 0, 0), end];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    webGroup.add(new THREE.Line(geo, spokeMat));
  });

  // Draw rings
  for (let r = 1; r <= rings; r++) {
    const ringR = (r / rings) * outerR;
    const ringGeo = new THREE.TorusGeometry(ringR, 0.025, 8, 64);
    const ring = new THREE.Mesh(ringGeo, ringMat.clone());
    ring.rotation.x = Math.PI / 2;
    webGroup.add(ring);

    // Node dots at spoke/ring intersections
    spokeEnds.forEach((end, si) => {
      const angle = (si / spokes) * Math.PI * 2;
      const nodeDot = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 8, 8),
        new THREE.MeshBasicMaterial({ color: nodeColor, transparent: true, opacity: 0.7 })
      );
      nodeDot.position.set(Math.cos(angle) * ringR, 0, Math.sin(angle) * ringR);
      webGroup.add(nodeDot);
    });
  }

  // Triangulated facets between spokes
  for (let s = 0; s < spokes; s++) {
    for (let r = 0; r < rings; r++) {
      const a0 = (s / spokes) * Math.PI * 2;
      const a1 = ((s + 1) / spokes) * Math.PI * 2;
      const r0 = ((r)   / rings) * outerR;
      const r1 = ((r+1) / rings) * outerR;

      const v0 = new THREE.Vector3(Math.cos(a0) * r0, 0, Math.sin(a0) * r0);
      const v1 = new THREE.Vector3(Math.cos(a1) * r0, 0, Math.sin(a1) * r0);
      const v2 = new THREE.Vector3(Math.cos(a1) * r1, 0, Math.sin(a1) * r1);
      const v3 = new THREE.Vector3(Math.cos(a0) * r1, 0, Math.sin(a0) * r1);

      const fGeo = new THREE.BufferGeometry();
      const verts = new Float32Array([
        v0.x,v0.y,v0.z,  v1.x,v1.y,v1.z,  v2.x,v2.y,v2.z,
        v0.x,v0.y,v0.z,  v2.x,v2.y,v2.z,  v3.x,v3.y,v3.z,
      ]);
      fGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      fGeo.computeVertexNormals();
      webGroup.add(new THREE.Mesh(fGeo, faceMat));

      // Edge lines for each facet
      const edgeColor = r % 2 === 0 ? 0x00e5ff : 0x00ff88;
      const eMat = new THREE.LineBasicMaterial({ color: edgeColor, transparent: true, opacity: 0.3 });
      const ePts = [v0, v1, v2, v3, v0];
      webGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ePts), eMat));
    }
  }

  // Wave mesh integrated into spider web structure
  const waveRadius = outerR;
  const waveSegments = 32;
  const waveGeo = new THREE.PlaneGeometry(waveRadius * 2, waveRadius * 2, waveSegments, waveSegments);
  
  // Store original positions for wave animation
  const wavePositions = waveGeo.attributes.position.array;
  const originalWavePositions = new Float32Array(wavePositions.length);
  for (let i = 0; i < wavePositions.length; i++) {
    originalWavePositions[i] = wavePositions[i];
  }
  waveGeo.userData = { originalPositions: originalWavePositions };
  
  // Wave material integrated with web style
  const integratedWaveMat = new THREE.MeshBasicMaterial({
    color: 0x00aaff,
    transparent: true,
    opacity: 0.08,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    wireframe: true,
  });
  
  const integratedWaveField = new THREE.Mesh(waveGeo, integratedWaveMat);
  integratedWaveField.rotation.x = -Math.PI / 2; // Horizontal plane
  integratedWaveField.userData = { waveTime: 0, waveSpeed: 1.8 };
  webGroup.add(integratedWaveField);
  
  // Store reference for animation
  window._webWaveField = integratedWaveField;

  // Central hub node
  const hubGeo = new THREE.OctahedronGeometry(0.5);
  const hubMat = new THREE.MeshPhongMaterial({
    color: 0x00e5ff,
    emissive: 0x006688,
    emissiveIntensity: 0.8,
    specular: 0xffffff,
    shininess: 200,
  });
  const hub = new THREE.Mesh(hubGeo, hubMat);
  hub.userData = {
    type: 'mesh',
    title: 'MESH NEXUS',
    desc: 'The distributed foundation layer. Handles routing, load balancing, and fault tolerance across the Manifold Federation.',
    stats: [
      { n: '8', l: 'SPOKES' },
      { n: '32', l: 'NODES' },
      { n: '99%', l: 'UPTIME' },
      { n: '<1ms', l: 'LATENCY' },
    ]
  };
  clickableObjects.push(hub);
  webGroup.add(hub);

  // Outer border ring
  const outerRingGeo = new THREE.TorusGeometry(outerR + 0.1, 0.05, 8, 128);
  const outerRingMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 });
  const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
  outerRing.rotation.x = Math.PI / 2;
  webGroup.add(outerRing);

  // Outer node dots
  spokeEnds.forEach(end => {
    const nd = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.9 })
    );
    nd.position.copy(end);
    webGroup.add(nd);
  });

  scene.add(webGroup);
}

// ── Mesh Network Connections ──────────────────────────────────
function buildConnections() {
  connectionGroup = new THREE.Group();
  window._flowParticles = [];
  
  const webCenter = new THREE.Vector3(0, -3.5, 0);
  const webRadius = 7.0;
  
  // Generate mesh routing points on spider web
  const meshRoutingPoints = [];
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const radius = webRadius * 0.6; // Inner ring of routing points
    meshRoutingPoints.push(new THREE.Vector3(
      Math.cos(angle) * radius,
      -3.5,
      Math.sin(angle) * radius
    ));
  }

  agentData.forEach((agent, idx) => {
    const agentPos = new THREE.Vector3(...agent.pos);
    
    // Route each agent to nearest mesh routing point
    const nearestMeshPoint = meshRoutingPoints.reduce((closest, point) => {
      const distToPoint = agentPos.distanceTo(point);
      const distToClosest = agentPos.distanceTo(closest);
      return distToPoint < distToClosest ? point : closest;
    });
    
    // 1. Agent → Mesh routing point
    const agentToMeshMid = agentPos.clone().lerp(nearestMeshPoint, 0.5);
    agentToMeshMid.y = agentPos.y - 2; // Arc downward
    const agentToMeshCurve = new THREE.QuadraticBezierCurve3(agentPos, agentToMeshMid, nearestMeshPoint);
    const agentToMeshPts = agentToMeshCurve.getPoints(30);
    
    const agentToMeshMat = new THREE.LineBasicMaterial({
      color: agent.color,
      transparent: true,
      opacity: 0.4,
    });
    connectionGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(agentToMeshPts), agentToMeshMat));
    
    // Flow particles: Agent → Mesh
    createFlowParticles(agentToMeshCurve, agent.color, 4);
    
    // 2. Lateral mesh routing to other agents
    const otherAgents = agentData.filter((_, i) => i !== idx);
    otherAgents.forEach((otherAgent, otherIdx) => {
      // Only create some connections to avoid clutter
      if ((idx + otherIdx) % 3 === 0) {
        const otherAgentPos = new THREE.Vector3(...otherAgent.pos);
        const otherNearestMeshPoint = meshRoutingPoints.reduce((closest, point) => {
          const distToPoint = otherAgentPos.distanceTo(point);
          const distToClosest = otherAgentPos.distanceTo(closest);
          return distToPoint < distToClosest ? point : closest;
        });
        
        // Create mesh routing path between routing points
        if (nearestMeshPoint !== otherNearestMeshPoint) {
          const meshMid = nearestMeshPoint.clone().lerp(otherNearestMeshPoint, 0.5);
          meshMid.y -= 0.3; // Slight curve through mesh
          const meshRouteCurve = new THREE.QuadraticBezierCurve3(nearestMeshPoint, meshMid, otherNearestMeshPoint);
          const meshRoutePts = meshRouteCurve.getPoints(20);
          
          const meshRouteMat = new THREE.LineBasicMaterial({
            color: 0x00aaff,
            transparent: true,
            opacity: 0.25,
          });
          connectionGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(meshRoutePts), meshRouteMat));
          
          // Flow particles through mesh
          createFlowParticles(meshRouteCurve, 0x00aaff, 2);
        }
        
        // 3. Mesh → Other agent
        const meshToAgentMid = otherNearestMeshPoint.clone().lerp(otherAgentPos, 0.5);
        meshToAgentMid.y = otherAgentPos.y - 1.5; // Arc upward
        const meshToAgentCurve = new THREE.QuadraticBezierCurve3(otherNearestMeshPoint, meshToAgentMid, otherAgentPos);
        const meshToAgentPts = meshToAgentCurve.getPoints(25);
        
        const meshToAgentMat = new THREE.LineBasicMaterial({
          color: otherAgent.color,
          transparent: true,
          opacity: 0.3,
        });
        connectionGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(meshToAgentPts), meshToAgentMat));
        
        // Flow particles: Mesh → Other agent
        createFlowParticles(meshToAgentCurve, otherAgent.color, 3);
      }
    });
  });
  
  // Central nexus connection to mesh
  const sophiaPos = new THREE.Vector3(0, 1.0, 0);
  const sophiaToMeshPts = [sophiaPos, webCenter];
  const sophiaToMeshMat = new THREE.LineBasicMaterial({ color: 0xaa00ff, transparent: true, opacity: 0.6 });
  connectionGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(sophiaToMeshPts), sophiaToMeshMat));

  scene.add(connectionGroup);
}

// Helper function to create flow particles along a curve
function createFlowParticles(curve, color, count) {
  const fpPositions = new Float32Array(count * 3);
  const fpGeo = new THREE.BufferGeometry();
  fpGeo.setAttribute('position', new THREE.BufferAttribute(fpPositions, 3));

  const fpMat = new THREE.PointsMaterial({
    color: color,
    size: 0.12,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });

  const fpPoints = new THREE.Points(fpGeo, fpMat);
  fpPoints.userData = { 
    curve, 
    count, 
    offsets: Array.from({length: count}, (_, i) => (i / count) + Math.random() * 0.1),
    speed: 0.8 + Math.random() * 0.4
  };
  connectionGroup.add(fpPoints);
  window._flowParticles.push(fpPoints);
}

// ── Ambient Particle System ────────────────────────────────────
function buildParticles() {
  const count = 600;
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  const palettes = [
    [0, 0.9, 1],   // cyan
    [0.67, 0, 1],  // violet
    [0, 1, 0.53],  // green
    [1, 1, 1],     // white
  ];

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 2 + Math.random() * 10;
    positions[i*3]   = Math.cos(angle) * r;
    positions[i*3+1] = -5 + Math.random() * 16;
    positions[i*3+2] = Math.sin(angle) * r;

    velocities[i*3]   = (Math.random() - 0.5) * 0.008;
    velocities[i*3+1] = 0.005 + Math.random() * 0.015;
    velocities[i*3+2] = (Math.random() - 0.5) * 0.008;

    const pal = palettes[Math.floor(Math.random() * palettes.length)];
    colors[i*3]   = pal[0];
    colors[i*3+1] = pal[1];
    colors[i*3+2] = pal[2];
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });

  particleSystem = new THREE.Points(geo, mat);
  particleSystem.userData = { velocities };
  scene.add(particleSystem);
}

// ── Animation Loop ─────────────────────────────────────────────

  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta   = clock.getDelta() || 0.016;

  // FPS counter
  frameCount++;
  if (elapsed - lastFpsTime >= 1) {
    currentFps = frameCount;
    frameCount = 0;
    lastFpsTime = elapsed;
    document.getElementById('tel-fps').textContent = `${currentFps} fps`;
  }

  // ── Topological forms: gentle rotation and morphing ──
  agentGroups.forEach((group, i) => {
    const base = group.userData.baseQuat;
