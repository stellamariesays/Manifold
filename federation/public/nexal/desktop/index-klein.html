<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexal Network — Klein Bottle Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000510; overflow: hidden; }
    #scene { position: fixed; inset: 0; width: 100%; height: 100%; }
    #debug { 
      position: absolute; top: 20px; left: 20px; 
      color: #00e5ff; font: 14px monospace; z-index: 100;
      background: rgba(0,5,16,0.8); padding: 10px; border-radius: 4px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="debug">KLEIN BOTTLE TEST: Loading...</div>
  <canvas id="scene"></canvas>
  
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
    
    const debug = document.getElementById('debug');
    
    // Klein Bottle geometry function (from our original working version)
    function makeKleinBottleGeometry(scale = 1, segments = 32) {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const indices = [];
      
      const uSteps = segments;
      const vSteps = segments;
      
      for (let i = 0; i <= uSteps; i++) {
        for (let j = 0; j <= vSteps; j++) {
          const u = (i / uSteps) * Math.PI * 2;
          const v = (j / vSteps) * Math.PI * 2;
          
          // Klein bottle parametric equations
          const a = 3, n = 2;
          const x = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.cos(u / n);
          const y = (a + Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v)) * Math.sin(u / n);
          const z = Math.sin(u / 2) * Math.sin(v) + Math.cos(u / 2) * Math.sin(2 * v);
          
          vertices.push(x * scale * 0.3, y * scale * 0.3, z * scale * 0.3);
        }
      }
      
      // Create triangular faces
      for (let i = 0; i < uSteps; i++) {
        for (let j = 0; j < vSteps; j++) {
          const a = i * (vSteps + 1) + j;
          const b = (i + 1) * (vSteps + 1) + j;
          const c = (i + 1) * (vSteps + 1) + j + 1;
          const d = i * (vSteps + 1) + j + 1;
          
          indices.push(a, b, d);
          indices.push(b, c, d);
        }
      }
      
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      
      return geometry;
    }
    
    try {
      debug.innerHTML = 'KLEIN BOTTLE TEST: Creating scene...';
      
      // Same working setup as before
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000510);
      
      const canvas = document.getElementById('scene');
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      
      renderer.setSize(window.innerWidth, window.innerHeight);
      
      debug.innerHTML = 'KLEIN BOTTLE TEST: Adding Klein bottles...';
      
      // Test Klein bottle with basic material (no shaders)
      const kleinGeo = makeKleinBottleGeometry(2, 24);
      const kleinMat = new THREE.MeshBasicMaterial({ 
        color: 0x4488ff,
        wireframe: true,
        side: THREE.DoubleSide
      });
      const klein = new THREE.Mesh(kleinGeo, kleinMat);
      scene.add(klein);
      
      // Second Klein bottle - solid
      const kleinGeo2 = makeKleinBottleGeometry(1.5, 32);
      const kleinMat2 = new THREE.MeshBasicMaterial({ 
        color: 0xff4488,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
      });
      const klein2 = new THREE.Mesh(kleinGeo2, kleinMat2);
      klein2.position.set(3, 0, 0);
      scene.add(klein2);
      
      // Test regular cube for comparison
      const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
      const cubeMat = new THREE.MeshBasicMaterial({ 
        color: 0x00ff88,
        wireframe: true
      });
      const cube = new THREE.Mesh(cubeGeo, cubeMat);
      cube.position.set(-3, 0, 0);
      scene.add(cube);
      
      // Camera position
      camera.position.set(0, 2, 8);
      camera.lookAt(0, 0, 0);
      
      debug.innerHTML = 'KLEIN BOTTLE TEST: Starting animation...';
      
      // Animation loop
      let frame = 0;
      function animate() {
        requestAnimationFrame(animate);
        
        frame++;
        
        // Rotate Klein bottles
        klein.rotation.x += 0.005;
        klein.rotation.y += 0.01;
        
        klein2.rotation.x += 0.008;
        klein2.rotation.z += 0.006;
        
        // Rotate comparison cube
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.02;
        
        renderer.render(scene, camera);
        
        if (frame % 60 === 0) {
          debug.innerHTML = `KLEIN BOTTLE TEST: Frame ${frame} ✓ Klein bottles rendering!`;
        }
      }
      
      // Handle resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      animate();
      
    } catch (error) {
      debug.innerHTML = 'KLEIN BOTTLE ERROR: ' + error.message;
      console.error('Klein bottle geometry error:', error);
    }
  </script>
</body>
</html>
