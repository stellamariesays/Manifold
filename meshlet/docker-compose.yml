      - AGENT_NAME=meshlet-10
      - GATE_URL=ws://host.docker.internal:8777
      - CAPABILITIES=ping,test,api,webhook
      - HUB_NAME=meshlet-hub
      - LOG_LEVEL=info

networks:
  meshlet-net:
    driver: bridge

# To scale up to 50 agents (or any number):
# docker compose up --scale meshlet-01=50
# 
# Note: When scaling, agent names will be auto-suffixed (meshlet-01_1, meshlet-01_2, etc.)
# This is useful for load testing The Gate and federation server.
# 
# For unique agent names when scaling, use:
# docker compose up --scale meshlet-01=10 --scale meshlet-02=10 --scale meshlet-03=10 ...